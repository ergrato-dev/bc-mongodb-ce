<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#001E2B"/>
  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" fill="#00ED64" font-size="15" font-weight="700">Replica Set — Arquitectura de Alta Disponibilidad</text>

  <!-- Primary node -->
  <rect x="290" y="55" width="180" height="85" rx="8" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="380" y="78" text-anchor="middle" fill="#00ED64" font-size="13" font-weight="700">PRIMARY</text>
  <text x="380" y="96" text-anchor="middle" fill="#e2e8f0" font-size="10">Lectura + Escritura</text>
  <text x="380" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">priority: 1  votes: 1</text>
  <text x="380" y="128" text-anchor="middle" fill="#00ED64" font-size="9">oplog writer</text>

  <!-- Secondary 1 -->
  <rect x="60" y="195" width="170" height="80" rx="8" fill="#023430" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="145" y="218" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">SECONDARY 1</text>
  <text x="145" y="236" text-anchor="middle" fill="#e2e8f0" font-size="10">Solo Lectura (replica)</text>
  <text x="145" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">priority: 1  votes: 1</text>
  <text x="145" y="268" text-anchor="middle" fill="#60a5fa" font-size="9">oplog follower</text>

  <!-- Secondary 2 -->
  <rect x="528" y="195" width="170" height="80" rx="8" fill="#023430" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="613" y="218" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">SECONDARY 2</text>
  <text x="613" y="236" text-anchor="middle" fill="#e2e8f0" font-size="10">Solo Lectura (replica)</text>
  <text x="613" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">priority: 0  votes: 1</text>
  <text x="613" y="268" text-anchor="middle" fill="#94a3b8" font-size="9">hidden: puede ser oculto</text>

  <!-- Oplog replication arrows -->
  <line x1="300" y1="130" x2="210" y2="195" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowY)"/>
  <text x="230" y="162" fill="#fbbf24" font-size="9">oplog sync</text>
  <line x1="460" y1="130" x2="550" y2="195" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowY)"/>
  <text x="490" y="162" fill="#fbbf24" font-size="9">oplog sync</text>

  <!-- Heartbeat arrows -->
  <line x1="230" y1="235" x2="290" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="528" y1="235" x2="460" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="230" y1="255" x2="528" y2="255" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="380" y="290" text-anchor="middle" fill="#94a3b8" font-size="9">heartbeat cada 2 segundos entre todos los miembros</text>

  <!-- Client writes -->
  <rect x="20" y="60" width="110" height="55" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="75" y="82" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Aplicación</text>
  <text x="75" y="99" text-anchor="middle" fill="#94a3b8" font-size="9">insertOne()</text>
  <text x="75" y="112" text-anchor="middle" fill="#94a3b8" font-size="9">updateOne()</text>
  <line x1="130" y1="87" x2="290" y2="87" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="210" y="80" fill="#00ED64" font-size="9">escritura</text>

  <!-- Read preference note -->
  <rect x="20" y="308" width="720" height="58" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="380" y="326" text-anchor="middle" fill="#00ED64" font-size="10" font-weight="600">readPreference</text>
  <text x="380" y="344" text-anchor="middle" fill="#e2e8f0" font-size="9">primary (default) · primaryPreferred · secondary · secondaryPreferred · nearest</text>
  <text x="380" y="360" text-anchor="middle" fill="#94a3b8" font-size="9">Las lecturas de secondary pueden tener replicación rezagada (eventual consistency)</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowY" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/>
    </marker>
  </defs>
</svg>
