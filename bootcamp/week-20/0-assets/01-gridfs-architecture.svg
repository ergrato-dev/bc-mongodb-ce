<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#001E2B"/>
  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" fill="#00ED64" font-size="15" font-weight="700">GridFS — Arquitectura de Almacenamiento de Archivos</text>

  <!-- Left: Client / Application -->
  <rect x="20" y="55" width="130" height="60" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="85" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Aplicación</text>
  <text x="85" y="97" text-anchor="middle" fill="#94a3b8" font-size="10">archivo.pdf  (50 MB)</text>

  <!-- Arrow: App → GridFS API -->
  <line x1="150" y1="85" x2="208" y2="85" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="179" y="78" text-anchor="middle" fill="#94a3b8" font-size="9">upload</text>

  <!-- GridFS API Box -->
  <rect x="208" y="55" width="140" height="60" rx="6" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="278" y="76" text-anchor="middle" fill="#00ED64" font-size="11" font-weight="700">GridFS Bucket</text>
  <text x="278" y="92" text-anchor="middle" fill="#94a3b8" font-size="10">chunkSize: 255 KB</text>
  <text x="278" y="107" text-anchor="middle" fill="#94a3b8" font-size="10">divide en chunks</text>

  <!-- Arrow: GridFS → fs.files -->
  <line x1="348" y1="72" x2="418" y2="130" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="395" y="100" fill="#60a5fa" font-size="9">metadata</text>

  <!-- Arrow: GridFS → fs.chunks -->
  <line x1="348" y1="95" x2="418" y2="230" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowYellow)"/>
  <text x="358" y="190" fill="#fbbf24" font-size="9">chunks</text>

  <!-- fs.files box -->
  <rect x="418" y="105" width="155" height="95" rx="6" fill="#023430" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="495" y="127" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">fs.files</text>
  <text x="495" y="145" text-anchor="middle" fill="#94a3b8" font-size="9">{ filename, length, chunkSize }</text>
  <text x="495" y="161" text-anchor="middle" fill="#94a3b8" font-size="9">{ uploadDate, contentType }</text>
  <text x="495" y="177" text-anchor="middle" fill="#94a3b8" font-size="9">{ metadata: { author, tags } }</text>
  <text x="495" y="193" text-anchor="middle" fill="#60a5fa" font-size="9">1 documento por archivo</text>

  <!-- fs.chunks box -->
  <rect x="418" y="215" width="155" height="105" rx="6" fill="#023430" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="495" y="237" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">fs.chunks</text>
  <text x="495" y="255" text-anchor="middle" fill="#94a3b8" font-size="9">{ files_id: ObjectId ← fs.files }</text>
  <text x="495" y="271" text-anchor="middle" fill="#94a3b8" font-size="9">{ n: 0, data: BinData(…255KB) }</text>
  <text x="495" y="287" text-anchor="middle" fill="#94a3b8" font-size="9">{ n: 1, data: BinData(…255KB) }</text>
  <text x="495" y="303" text-anchor="middle" fill="#94a3b8" font-size="9">{ n: 2, data: BinData(…155KB) }</text>
  <text x="495" y="319" text-anchor="middle" fill="#fbbf24" font-size="9">N documentos por archivo</text>

  <!-- Índice en fs.chunks -->
  <rect x="590" y="240" width="150" height="55" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="665" y="258" text-anchor="middle" fill="#00ED64" font-size="9" font-weight="600">Índice automático</text>
  <text x="665" y="273" text-anchor="middle" fill="#94a3b8" font-size="9">{ files_id: 1, n: 1 }</text>
  <text x="665" y="288" text-anchor="middle" fill="#94a3b8" font-size="9">unique: true</text>
  <line x1="573" y1="268" x2="590" y2="268" stroke="#00684A" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <!-- Limit note -->
  <rect x="20" y="165" width="170" height="55" rx="5" fill="#001E2B" stroke="#ef4444" stroke-width="1"/>
  <text x="105" y="183" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Límite BSON: 16 MB</text>
  <text x="105" y="199" text-anchor="middle" fill="#94a3b8" font-size="9">Un documento no puede superar</text>
  <text x="105" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">los 16 MB → usa GridFS</text>

  <!-- Download arrow (right side, reverse) -->
  <line x1="418" y1="152" x2="355" y2="108" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
  <text x="375" y="122" fill="#94a3b8" font-size="8">download</text>

  <!-- Use cases bar bottom -->
  <rect x="20" y="338" width="720" height="32" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="380" y="356" text-anchor="middle" fill="#e2e8f0" font-size="10">Casos de uso: Imágenes · PDFs · Videos · Backups · Modelos ML · Archivos de audio</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00684A"/>
    </marker>
  </defs>
</svg>
