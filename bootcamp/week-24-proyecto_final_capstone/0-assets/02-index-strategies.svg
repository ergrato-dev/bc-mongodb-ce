<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <rect width="760" height="400" fill="#001E2B"/>

  <!-- Título -->
  <text x="380" y="30" font-family="Inter, Roboto, sans-serif" font-size="15" font-weight="bold"
        fill="#00ED64" text-anchor="middle">Estrategia de Índices para Producción</text>
  <text x="380" y="50" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#94a3b8" text-anchor="middle">Compound · Partial · TTL · Text · 2dsphere</text>

  <!-- ── columna 1: Compound ── -->
  <rect x="20" y="65" width="215" height="145" rx="8" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="127" y="85" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="bold"
        fill="#00ED64" text-anchor="middle">Índice Compuesto</text>
  <line x1="20" y1="92" x2="235" y2="92" stroke="#00684A" stroke-width="1"/>
  <text x="36" y="110" font-family="monospace" font-size="10" fill="#e2e8f0">{ status: 1,</text>
  <text x="36" y="126" font-family="monospace" font-size="10" fill="#e2e8f0">  createdAt: -1 }</text>
  <text x="36" y="148" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#94a3b8">Query cubierta:</text>
  <text x="36" y="164" font-family="monospace" font-size="9" fill="#60a5fa">find({status,"pending"})</text>
  <text x="36" y="180" font-family="monospace" font-size="9" fill="#60a5fa">.sort({createdAt:-1})</text>
  <text x="36" y="199" font-family="Inter, Roboto, sans-serif" font-size="9"
        fill="#fbbf24">ESR rule: Equality → Sort → Range</text>

  <!-- ── columna 2: Partial ── -->
  <rect x="250" y="65" width="215" height="145" rx="8" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="357" y="85" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="bold"
        fill="#00ED64" text-anchor="middle">Índice Parcial</text>
  <line x1="250" y1="92" x2="465" y2="92" stroke="#00684A" stroke-width="1"/>
  <text x="266" y="110" font-family="monospace" font-size="10" fill="#e2e8f0">{ price: 1 },</text>
  <text x="266" y="126" font-family="monospace" font-size="10" fill="#fbbf24">{ partialFilterExpression:</text>
  <text x="266" y="142" font-family="monospace" font-size="10" fill="#fbbf24">  { isActive: true } }</text>
  <text x="266" y="162" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#94a3b8">Solo indexa docs activos</text>
  <text x="266" y="178" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#94a3b8">→ menor tamaño en disco</text>
  <text x="266" y="199" font-family="Inter, Roboto, sans-serif" font-size="9"
        fill="#60a5fa">Útil: soft-delete patterns</text>

  <!-- ── columna 3: TTL ── -->
  <rect x="480" y="65" width="260" height="145" rx="8" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="610" y="85" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="bold"
        fill="#00ED64" text-anchor="middle">Índice TTL</text>
  <line x1="480" y1="92" x2="740" y2="92" stroke="#00684A" stroke-width="1"/>
  <text x="496" y="110" font-family="monospace" font-size="10" fill="#e2e8f0">{ expiresAt: 1 },</text>
  <text x="496" y="126" font-family="monospace" font-size="10" fill="#ef4444">{ expireAfterSeconds: 0 }</text>
  <text x="496" y="148" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#94a3b8">Elimina docs cuando</text>
  <text x="496" y="164" font-family="monospace" font-size="9" fill="#94a3b8">  expiresAt &lt; now()</text>
  <text x="496" y="180" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#94a3b8">→ sesiones, tokens, logs</text>
  <text x="496" y="199" font-family="Inter, Roboto, sans-serif" font-size="9"
        fill="#fbbf24">TTL thread cada ~60 segundos</text>

  <!-- ── fila 2: Text + 2dsphere ── -->

  <!-- Text -->
  <rect x="20" y="235" width="340" height="140" rx="8" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="190" y="255" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="bold"
        fill="#00ED64" text-anchor="middle">Índice de Texto ($text)</text>
  <line x1="20" y1="262" x2="360" y2="262" stroke="#00684A" stroke-width="1"/>
  <text x="36" y="280" font-family="monospace" font-size="10" fill="#e2e8f0">{ name: "text",</text>
  <text x="36" y="296" font-family="monospace" font-size="10" fill="#e2e8f0">  description: "text" }</text>
  <text x="36" y="316" font-family="monospace" font-size="10" fill="#60a5fa">db.col.find({</text>
  <text x="36" y="332" font-family="monospace" font-size="10" fill="#60a5fa">  $text: { $search: "café" }</text>
  <text x="36" y="348" font-family="monospace" font-size="10" fill="#60a5fa">})</text>
  <text x="36" y="366" font-family="Inter, Roboto, sans-serif" font-size="9"
        fill="#94a3b8">Solo 1 índice de texto por colección. Usa weights para prioridad.</text>

  <!-- 2dsphere -->
  <rect x="375" y="235" width="365" height="140" rx="8" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="557" y="255" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="bold"
        fill="#00ED64" text-anchor="middle">Índice Geoespacial (2dsphere)</text>
  <line x1="375" y1="262" x2="740" y2="262" stroke="#00684A" stroke-width="1"/>
  <text x="391" y="280" font-family="monospace" font-size="10" fill="#e2e8f0">location: {</text>
  <text x="391" y="296" font-family="monospace" font-size="10" fill="#e2e8f0">  type: "Point",</text>
  <text x="391" y="312" font-family="monospace" font-size="10" fill="#e2e8f0">  coordinates: [lng, lat]</text>
  <text x="391" y="328" font-family="monospace" font-size="10" fill="#e2e8f0">}</text>
  <text x="391" y="348" font-family="monospace" font-size="10" fill="#60a5fa">$near, $geoWithin,</text>
  <text x="391" y="364" font-family="monospace" font-size="10" fill="#60a5fa">$nearSphere</text>
</svg>
