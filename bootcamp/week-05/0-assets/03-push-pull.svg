<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 330" width="780" height="330" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="330" fill="#001E2B"/>
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">$push, $pull, $addToSet — Arrays</text>

  <!-- Array visual -->
  <text x="390" y="68" text-anchor="middle" font-size="12" fill="#94a3b8">tags: [ "nosql", "database", "mongodb" ]</text>

  <!-- $push -->
  <rect x="30" y="82" width="220" height="115" rx="6" fill="#023430"/>
  <text x="140" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#00ED64">$push</text>
  <text x="140" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">Agrega (permite duplicados)</text>
  <rect x="40" y="128" width="200" height="22" rx="3" fill="#001E2B"/>
  <text x="140" y="143" text-anchor="middle" font-size="11" fill="#e2e8f0">{ $push: { tags: "sale" } }</text>
  <text x="45" y="163" font-size="10" fill="#00ED64">→ [..., "sale"]  (siempre agrega)</text>
  <text x="45" y="178" font-size="10" fill="#94a3b8">$each: [v1,v2] — varios a la vez</text>

  <!-- $addToSet -->
  <rect x="278" y="82" width="220" height="115" rx="6" fill="#023430"/>
  <text x="388" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">$addToSet</text>
  <text x="388" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">Agrega solo si NO existe</text>
  <rect x="288" y="128" width="200" height="22" rx="3" fill="#001E2B"/>
  <text x="388" y="143" text-anchor="middle" font-size="11" fill="#e2e8f0">{ $addToSet: { tags: "sale" } }</text>
  <text x="293" y="163" font-size="10" fill="#60a5fa">→ sin duplicados (set)</text>
  <text x="293" y="178" font-size="10" fill="#94a3b8">Ideal para tags, roles, permisos</text>

  <!-- $pull -->
  <rect x="526" y="82" width="220" height="115" rx="6" fill="#023430"/>
  <text x="636" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#ef4444">$pull</text>
  <text x="636" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">Elimina elementos que coinciden</text>
  <rect x="536" y="128" width="200" height="22" rx="3" fill="#001E2B"/>
  <text x="636" y="143" text-anchor="middle" font-size="11" fill="#e2e8f0">{ $pull: { tags: "nosql" } }</text>
  <text x="541" y="163" font-size="10" fill="#ef4444">→ ["database","mongodb"]</text>
  <text x="541" y="178" font-size="10" fill="#94a3b8">Acepta expresión: {$lt: 60}</text>

  <!-- Comparison table -->
  <rect x="30" y="215" width="720" height="100" rx="6" fill="#023430"/>
  <text x="390" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Comparativa</text>
  <line x1="30" y1="245" x2="750" y2="245" stroke="#1e3a4a" stroke-width="1"/>
  <text x="120" y="262" text-anchor="middle" font-size="11" fill="#e2e8f0">Operador</text>
  <text x="310" y="262" text-anchor="middle" font-size="11" fill="#e2e8f0">¿Duplicados?</text>
  <text x="510" y="262" text-anchor="middle" font-size="11" fill="#e2e8f0">Caso de uso</text>
  <line x1="30" y1="270" x2="750" y2="270" stroke="#1e3a4a" stroke-width="1"/>
  <text x="120" y="285" text-anchor="middle" font-size="11" fill="#00ED64">$push</text>
  <text x="310" y="285" text-anchor="middle" font-size="11" fill="#e2e8f0">Sí</text>
  <text x="510" y="285" text-anchor="middle" font-size="11" fill="#e2e8f0">Historial, log de eventos</text>
  <text x="120" y="303" text-anchor="middle" font-size="11" fill="#60a5fa">$addToSet</text>
  <text x="310" y="303" text-anchor="middle" font-size="11" fill="#e2e8f0">No</text>
  <text x="510" y="303" text-anchor="middle" font-size="11" fill="#e2e8f0">Tags únicos, roles, permisos</text>
</svg>
