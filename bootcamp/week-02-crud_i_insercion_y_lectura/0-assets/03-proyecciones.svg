<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="Inter,Roboto,'Open Sans',sans-serif">
  <rect width="760" height="440" fill="#001E2B"/>
  <rect width="760" height="46" fill="#023430"/>
  <text x="380" y="30" text-anchor="middle" fill="#00ED64" font-size="16" font-weight="700">Proyecciones — Inclusión y Exclusión de Campos</text>

  <!-- Documento fuente -->
  <text x="380" y="68" text-anchor="middle" fill="#94a3b8" font-size="11">Documento en la colección (todos los campos)</text>
  <rect x="200" y="76" width="360" height="110" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="216" y="96" fill="#94a3b8" font-size="10">_id:</text>
  <text x="248" y="96" fill="#60a5fa" font-size="10"> ObjectId("64a...")</text>
  <text x="216" y="113" fill="#94a3b8" font-size="10">title:</text>
  <text x="254" y="113" fill="#e2e8f0" font-size="10"> "Clean Code"</text>
  <text x="216" y="130" fill="#94a3b8" font-size="10">author:</text>
  <text x="258" y="130" fill="#e2e8f0" font-size="10"> "Robert C. Martin"</text>
  <text x="216" y="147" fill="#94a3b8" font-size="10">price:</text>
  <text x="254" y="147" fill="#93c5fd" font-size="10"> Decimal128("39.99")</text>
  <text x="216" y="164" fill="#94a3b8" font-size="10">tags:</text>
  <text x="252" y="164" fill="#fbbf24" font-size="10"> ["programming", "best-practices"]</text>
  <text x="216" y="181" fill="#94a3b8" font-size="10">inStock:</text>
  <text x="260" y="181" fill="#86efac" font-size="10"> true</text>

  <!-- Flechas -->
  <defs>
    <marker id="ag" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f97316"/>
    </marker>
  </defs>
  <line x1="270" y1="186" x2="180" y2="218" stroke="#00ED64" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="490" y1="186" x2="580" y2="218" stroke="#f97316" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- PANEL IZQUIERDO: Inclusión -->
  <rect x="28" y="218" width="320" height="160" rx="6" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <rect x="28" y="218" width="320" height="28" rx="6" fill="#00ED64"/>
  <rect x="28" y="238" width="320" height="8" fill="#00ED64"/>
  <text x="188" y="237" text-anchor="middle" fill="#001E2B" font-size="11" font-weight="700">Proyección de INCLUSIÓN  ( campo: 1 )</text>

  <rect x="44" y="258" width="288" height="22" rx="3" fill="#0f172a"/>
  <text x="52" y="272" fill="#00ED64" font-size="10">db.books.find({}, {</text>
  <text x="178" y="272" fill="#a78bfa" font-size="10"> title: 1, author: 1, _id: 0</text>
  <text x="300" y="272" fill="#00ED64" font-size="10"> })</text>

  <text x="44" y="298" fill="#94a3b8" font-size="9">Devuelve:</text>
  <rect x="44" y="305" width="288" height="54" rx="3" fill="#001E2B"/>
  <text x="52" y="320" fill="#e2e8f0" font-size="9">{  title: "Clean Code",</text>
  <text x="52" y="336" fill="#e2e8f0" font-size="9">   author: "Robert C. Martin"  }</text>
  <text x="52" y="352" fill="#94a3b8" font-size="8" font-style="italic">← sin _id porque se excluyó explícitamente</text>
  <text x="44" y="372" fill="#f87171" font-size="9">❌ price, tags, inStock — no se muestran</text>

  <!-- PANEL DERECHO: Exclusión -->
  <rect x="412" y="218" width="320" height="160" rx="6" fill="#023430" stroke="#f97316" stroke-width="2"/>
  <rect x="412" y="218" width="320" height="28" rx="6" fill="#f97316"/>
  <rect x="412" y="238" width="320" height="8" fill="#f97316"/>
  <text x="572" y="237" text-anchor="middle" fill="#001E2B" font-size="11" font-weight="700">Proyección de EXCLUSIÓN  ( campo: 0 )</text>

  <rect x="428" y="258" width="288" height="22" rx="3" fill="#0f172a"/>
  <text x="436" y="272" fill="#00ED64" font-size="10">db.books.find({}, {</text>
  <text x="562" y="272" fill="#a78bfa" font-size="10"> tags: 0, inStock: 0</text>
  <text x="660" y="272" fill="#00ED64" font-size="10"> })</text>

  <text x="428" y="298" fill="#94a3b8" font-size="9">Devuelve:</text>
  <rect x="428" y="305" width="288" height="54" rx="3" fill="#001E2B"/>
  <text x="436" y="320" fill="#e2e8f0" font-size="9">{  _id: ObjectId("64a..."),</text>
  <text x="436" y="336" fill="#e2e8f0" font-size="9">   title: "Clean Code",  author: "...",  price: 39.99  }</text>
  <text x="436" y="352" fill="#f87171" font-size="9">❌ tags, inStock — excluidos explícitamente</text>
  <text x="428" y="372" fill="#86efac" font-size="9">✅ _id siempre incluido (salvo que se excluya)</text>

  <!-- Regla de oro -->
  <rect x="28" y="392" width="704" height="38" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="380" y="407" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Regla de oro:</text>
  <text x="380" y="422" text-anchor="middle" fill="#e2e8f0" font-size="10">NO mezclar 1 y 0 en la misma proyección — excepto <tspan fill="#60a5fa">_id</tspan>.  Usar solo inclusión O solo exclusión.</text>
</svg>
