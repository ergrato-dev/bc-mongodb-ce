<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" width="780" height="300" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="300" fill="#001E2B"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Tipos BSON en MongoDB</text>

  <!-- ObjectId -->
  <rect x="20" y="52" width="170" height="75" rx="6" fill="#023430"/>
  <text x="105" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#00ED64">ObjectId</text>
  <text x="105" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">12 bytes · único global</text>
  <rect x="28" y="96" width="154" height="22" rx="3" fill="#001E2B"/>
  <text x="105" y="112" text-anchor="middle" font-size="11" fill="#e2e8f0">ObjectId("64abc...")</text>

  <!-- Date -->
  <rect x="205" y="52" width="170" height="75" rx="6" fill="#023430"/>
  <text x="290" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#60a5fa">Date</text>
  <text x="290" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">milisegundos epoch UTC</text>
  <rect x="213" y="96" width="154" height="22" rx="3" fill="#001E2B"/>
  <text x="290" y="112" text-anchor="middle" font-size="11" fill="#e2e8f0">new Date("2024-01-15")</text>

  <!-- Decimal128 -->
  <rect x="390" y="52" width="170" height="75" rx="6" fill="#023430"/>
  <text x="475" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">Decimal128</text>
  <text x="475" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">precisión para montos</text>
  <rect x="398" y="96" width="154" height="22" rx="3" fill="#001E2B"/>
  <text x="475" y="112" text-anchor="middle" font-size="11" fill="#e2e8f0">Decimal128("49.99")</text>

  <!-- String -->
  <rect x="575" y="52" width="185" height="75" rx="6" fill="#023430"/>
  <text x="667" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa">String</text>
  <text x="667" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">UTF-8 · uso general</text>
  <rect x="583" y="96" width="169" height="22" rx="3" fill="#001E2B"/>
  <text x="667" y="112" text-anchor="middle" font-size="11" fill="#e2e8f0">"Bogotá"</text>

  <!-- Numbers row -->
  <rect x="20" y="148" width="170" height="75" rx="6" fill="#023430"/>
  <text x="105" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">NumberInt</text>
  <text x="105" y="185" text-anchor="middle" font-size="11" fill="#94a3b8">4 bytes · Int32</text>
  <rect x="28" y="192" width="154" height="22" rx="3" fill="#001E2B"/>
  <text x="105" y="208" text-anchor="middle" font-size="11" fill="#e2e8f0">NumberInt(42)</text>

  <rect x="205" y="148" width="170" height="75" rx="6" fill="#023430"/>
  <text x="290" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">NumberLong</text>
  <text x="290" y="185" text-anchor="middle" font-size="11" fill="#94a3b8">8 bytes · Int64</text>
  <rect x="213" y="192" width="154" height="22" rx="3" fill="#001E2B"/>
  <text x="290" y="208" text-anchor="middle" font-size="11" fill="#e2e8f0">NumberLong(1500000)</text>

  <!-- Boolean -->
  <rect x="390" y="148" width="170" height="75" rx="6" fill="#023430"/>
  <text x="475" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#f472b6">Boolean</text>
  <text x="475" y="185" text-anchor="middle" font-size="11" fill="#94a3b8">true / false</text>
  <rect x="398" y="192" width="154" height="22" rx="3" fill="#001E2B"/>
  <text x="475" y="208" text-anchor="middle" font-size="11" fill="#e2e8f0">isActive: true</text>

  <!-- Array -->
  <rect x="575" y="148" width="185" height="75" rx="6" fill="#023430"/>
  <text x="667" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#fb923c">Array</text>
  <text x="667" y="185" text-anchor="middle" font-size="11" fill="#94a3b8">lista de valores</text>
  <rect x="583" y="192" width="169" height="22" rx="3" fill="#001E2B"/>
  <text x="667" y="208" text-anchor="middle" font-size="11" fill="#e2e8f0">tags: ["a", "b", "c"]</text>

  <!-- Note -->
  <rect x="130" y="238" width="520" height="42" rx="5" fill="#00684A" opacity="0.25"/>
  <rect x="130" y="238" width="520" height="42" rx="5" fill="none" stroke="#00684A" stroke-width="1.2"/>
  <text x="390" y="257" text-anchor="middle" font-size="11" fill="#00ED64">⚠️  Usa constructores explícitos en scripts .js (Decimal128, NumberInt, NumberLong)</text>
  <text x="390" y="272" text-anchor="middle" font-size="11" fill="#94a3b8">En mongosh interactivo, los números se infieren como Double por defecto</text>
</svg>
