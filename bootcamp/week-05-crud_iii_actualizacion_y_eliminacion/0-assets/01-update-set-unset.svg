<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="340" fill="#001E2B"/>
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">updateOne() y updateMany() — $set y $unset</text>

  <!-- Before doc -->
  <rect x="30" y="58" width="210" height="130" rx="6" fill="#023430"/>
  <text x="135" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Antes</text>
  <text x="45" y="96" font-size="11" fill="#94a3b8">_id: ObjectId(…)</text>
  <text x="45" y="113" font-size="11" fill="#e2e8f0">name: "Laptop"</text>
  <text x="45" y="130" font-size="11" fill="#e2e8f0">price: 1299.99</text>
  <text x="45" y="147" font-size="11" fill="#e2e8f0">stock: 12</text>
  <text x="45" y="164" font-size="11" fill="#94a3b8">inStock: true</text>
  <text x="45" y="181" font-size="11" fill="#94a3b8">// sin updatedAt</text>

  <!-- Arrow -->
  <line x1="245" y1="123" x2="305" y2="123" stroke="#00ED64" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/>
    </marker>
  </defs>

  <!-- Update operation -->
  <rect x="250" y="58" width="270" height="130" rx="6" fill="#023430"/>
  <text x="385" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#00ED64">Operación</text>
  <text x="265" y="98" font-size="11" fill="#94a3b8">db.products.updateOne(</text>
  <text x="275" y="115" font-size="11" fill="#60a5fa">  { name: "Laptop" },</text>
  <text x="275" y="132" font-size="11" fill="#e2e8f0">  {</text>
  <text x="285" y="149" font-size="11" fill="#00ED64">    $set: { price: 1199.99,</text>
  <text x="285" y="164" font-size="11" fill="#00ED64">           updatedAt: Date() },</text>
  <text x="285" y="179" font-size="11" fill="#ef4444">    $unset: { temp: "" }</text>
  <text x="275" y="194" font-size="11" fill="#e2e8f0">  }</text>

  <!-- Arrow 2 -->
  <line x1="525" y1="123" x2="575" y2="123" stroke="#00ED64" stroke-width="2" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/>
    </marker>
  </defs>

  <!-- After doc -->
  <rect x="540" y="58" width="210" height="150" rx="6" fill="#023430"/>
  <text x="645" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#00ED64">Después</text>
  <text x="555" y="96" font-size="11" fill="#94a3b8">_id: ObjectId(…)</text>
  <text x="555" y="113" font-size="11" fill="#e2e8f0">name: "Laptop"</text>
  <text x="555" y="130" font-size="11" fill="#00ED64">price: 1199.99  ✓ modificado</text>
  <text x="555" y="147" font-size="11" fill="#e2e8f0">stock: 12</text>
  <text x="555" y="164" font-size="11" fill="#e2e8f0">inStock: true</text>
  <text x="555" y="181" font-size="11" fill="#00ED64">updatedAt: …  ✓ nuevo</text>
  <text x="555" y="198" font-size="11" fill="#ef4444">// temp eliminado ✓</text>

  <!-- Warning box -->
  <rect x="30" y="225" width="720" height="38" rx="6" fill="#7c1d1d" fill-opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="390" y="248" text-anchor="middle" font-size="12" fill="#fca5a5">⚠️  Sin operador: updateOne(filtro, {name:"x"}) reemplaza TODO el documento — solo queda {_id, name:"x"}</text>

  <!-- updateMany note -->
  <rect x="30" y="275" width="720" height="52" rx="6" fill="#023430"/>
  <text x="390" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">updateMany() — aplica el mismo update a TODOS los que coinciden</text>
  <text x="390" y="313" text-anchor="middle" font-size="11" fill="#94a3b8">db.products.updateMany( { category: "accessories" }, { $set: { featured: false } } )</text>
</svg>
