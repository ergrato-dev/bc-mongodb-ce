<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#001E2B"/>
  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" fill="#00ED64" font-size="15" font-weight="700">MongoDB con Node.js — Arquitectura de Conexión</text>

  <!-- App layer -->
  <rect x="15" y="45" width="170" height="295" rx="6" fill="#023430" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="100" y="67" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700">Aplicación Node.js</text>
  <rect x="25" y="77" width="150" height="50" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="100" y="96" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">app.js</text>
  <text x="100" y="111" text-anchor="middle" fill="#94a3b8" font-size="8">Lógica de negocio</text>
  <rect x="25" y="137" width="150" height="50" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="100" y="156" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">repository.js</text>
  <text x="100" y="171" text-anchor="middle" fill="#94a3b8" font-size="8">Funciones de datos</text>
  <rect x="25" y="197" width="150" height="50" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="100" y="216" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">db.js</text>
  <text x="100" y="231" text-anchor="middle" fill="#94a3b8" font-size="8">MongoClient singleton</text>
  <text x="100" y="310" text-anchor="middle" fill="#94a3b8" font-size="8">mongodb npm package</text>
  <text x="100" y="325" text-anchor="middle" fill="#00ED64" font-size="8">mongodb@6.x</text>

  <!-- Arrow app → pool -->
  <line x1="185" y1="195" x2="220" y2="195" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#fbbf24"/></marker></defs>

  <!-- Connection Pool -->
  <rect x="220" y="45" width="185" height="295" rx="6" fill="#023430" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="312" y="67" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Connection Pool</text>
  <text x="312" y="83" text-anchor="middle" fill="#94a3b8" font-size="8">maxPoolSize: 10 (default)</text>
  <rect x="230" y="93" width="165" height="26" rx="3" fill="#001E2B" stroke="#00ED64" stroke-width="1"/>
  <text x="312" y="111" text-anchor="middle" fill="#00ED64" font-size="8.5">Conexión #1 (activa)</text>
  <rect x="230" y="127" width="165" height="26" rx="3" fill="#001E2B" stroke="#00ED64" stroke-width="1"/>
  <text x="312" y="145" text-anchor="middle" fill="#00ED64" font-size="8.5">Conexión #2 (activa)</text>
  <rect x="230" y="161" width="165" height="26" rx="3" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="312" y="179" text-anchor="middle" fill="#60a5fa" font-size="8.5">Conexión #3 (idle)</text>
  <rect x="230" y="195" width="165" height="26" rx="3" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="312" y="213" text-anchor="middle" fill="#60a5fa" font-size="8.5">Conexión #4 (idle)</text>
  <text x="312" y="247" text-anchor="middle" fill="#94a3b8" font-size="9">···</text>
  <rect x="230" y="258" width="165" height="26" rx="3" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="312" y="276" text-anchor="middle" fill="#94a3b8" font-size="8.5">Conexión #10 (disponible)</text>
  <text x="312" y="320" text-anchor="middle" fill="#94a3b8" font-size="8">Una sola instancia</text>
  <text x="312" y="334" text-anchor="middle" fill="#94a3b8" font-size="8">de MongoClient</text>

  <!-- Arrow pool → mongo -->
  <line x1="405" y1="195" x2="440" y2="195" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MongoDB -->
  <rect x="440" y="45" width="300" height="295" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.2"/>
  <text x="590" y="67" text-anchor="middle" fill="#00ED64" font-size="10" font-weight="700">MongoDB (Docker rs0)</text>
  <text x="590" y="84" text-anchor="middle" fill="#94a3b8" font-size="8">mongodb://bootcamp:bootcamp123@localhost:27017/bootcamp_db</text>

  <rect x="450" y="95" width="280" height="60" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="590" y="114" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">collection.insertOne / insertMany</text>
  <text x="590" y="130" text-anchor="middle" fill="#94a3b8" font-size="8">{ acknowledged: true, insertedId: ObjectId }</text>
  <text x="590" y="146" text-anchor="middle" fill="#94a3b8" font-size="8">{ acknowledged: true, insertedIds: {...} }</text>

  <rect x="450" y="165" width="280" height="60" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="590" y="183" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">collection.find / findOne</text>
  <text x="590" y="199" text-anchor="middle" fill="#94a3b8" font-size="8">find → Cursor → .toArray()</text>
  <text x="590" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">findOne → Document | null</text>

  <rect x="450" y="235" width="280" height="60" rx="4" fill="#001E2B" stroke="#fbbf24" stroke-width="1"/>
  <text x="590" y="253" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">collection.updateOne / deleteOne</text>
  <text x="590" y="269" text-anchor="middle" fill="#94a3b8" font-size="8">{ matchedCount:1, modifiedCount:1 }</text>
  <text x="590" y="285" text-anchor="middle" fill="#94a3b8" font-size="8">{ acknowledged: true, deletedCount:1 }</text>

  <text x="590" y="318" text-anchor="middle" fill="#94a3b8" font-size="8">bootcamp_db · port 27017</text>
  <text x="590" y="332" text-anchor="middle" fill="#94a3b8" font-size="8">authenticationDatabase: admin</text>
</svg>
