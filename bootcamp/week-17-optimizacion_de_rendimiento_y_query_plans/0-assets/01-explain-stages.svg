<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="760" height="380" fill="#001E2B"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" fill="#00ED64" font-size="15" font-weight="bold">explain("executionStats") — COLLSCAN vs IXSCAN</text>

  <!-- LEFT: COLLSCAN -->
  <text x="185" y="58" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">Sin índice → COLLSCAN</text>

  <!-- Query box -->
  <rect x="90" y="68" width="190" height="34" rx="6" fill="#023430" stroke="#00684A"/>
  <text x="185" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">db.sales.find(</text>
  <text x="185" y="95" text-anchor="middle" fill="#e2e8f0" font-size="10">{ status: "completed" }</text>

  <!-- Arrow down -->
  <line x1="185" y1="102" x2="185" y2="122" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- COLLSCAN box -->
  <rect x="90" y="122" width="190" height="50" rx="6" fill="#3b0a0a" stroke="#ef4444"/>
  <text x="185" y="140" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">COLLSCAN</text>
  <text x="185" y="156" text-anchor="middle" fill="#94a3b8" font-size="10">Lee cada documento de la colección</text>
  <text x="185" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">sin filtro previo por índice</text>

  <!-- Arrow down -->
  <line x1="185" y1="172" x2="185" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stats box COLLSCAN -->
  <rect x="70" y="192" width="230" height="90" rx="6" fill="#023430" stroke="#ef4444"/>
  <text x="90" y="210" fill="#94a3b8" font-size="10">stage:</text>
  <text x="180" y="210" fill="#ef4444" font-size="10" font-weight="bold">"COLLSCAN"</text>
  <text x="90" y="226" fill="#94a3b8" font-size="10">nReturned:</text>
  <text x="180" y="226" fill="#e2e8f0" font-size="10">47</text>
  <text x="90" y="242" fill="#94a3b8" font-size="10">totalDocsExamined:</text>
  <text x="230" y="242" fill="#ef4444" font-size="10" font-weight="bold">10 000</text>
  <text x="90" y="258" fill="#94a3b8" font-size="10">totalKeysExamined:</text>
  <text x="230" y="258" fill="#e2e8f0" font-size="10">0</text>
  <text x="90" y="274" fill="#94a3b8" font-size="10">executionTimeMillis:</text>
  <text x="230" y="274" fill="#ef4444" font-size="10" font-weight="bold">84 ms</text>

  <!-- SLOW label -->
  <rect x="120" y="295" width="130" height="26" rx="6" fill="#3b0a0a" stroke="#ef4444"/>
  <text x="185" y="313" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">⚠ LENTO — ineficiente</text>


  <!-- RIGHT: IXSCAN -->
  <text x="565" y="58" text-anchor="middle" fill="#00ED64" font-size="12" font-weight="bold">Con índice → IXSCAN</text>

  <rect x="470" y="68" width="190" height="34" rx="6" fill="#023430" stroke="#00684A"/>
  <text x="565" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">db.sales.find(</text>
  <text x="565" y="95" text-anchor="middle" fill="#e2e8f0" font-size="10">{ status: "completed" }</text>

  <line x1="565" y1="102" x2="565" y2="122" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IXSCAN box -->
  <rect x="470" y="122" width="190" height="50" rx="6" fill="#00191f" stroke="#00ED64"/>
  <text x="565" y="140" text-anchor="middle" fill="#00ED64" font-size="12" font-weight="bold">IXSCAN</text>
  <text x="565" y="156" text-anchor="middle" fill="#94a3b8" font-size="10">Recorre el índice B-tree,</text>
  <text x="565" y="168" text-anchor="middle" fill="#94a3b8" font-size="10">recupera solo docs relevantes</text>

  <line x1="565" y1="172" x2="565" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stats box IXSCAN -->
  <rect x="450" y="192" width="230" height="90" rx="6" fill="#023430" stroke="#00ED64"/>
  <text x="470" y="210" fill="#94a3b8" font-size="10">stage:</text>
  <text x="560" y="210" fill="#00ED64" font-size="10" font-weight="bold">"IXSCAN"</text>
  <text x="470" y="226" fill="#94a3b8" font-size="10">nReturned:</text>
  <text x="560" y="226" fill="#e2e8f0" font-size="10">47</text>
  <text x="470" y="242" fill="#94a3b8" font-size="10">totalDocsExamined:</text>
  <text x="610" y="242" fill="#00ED64" font-size="10" font-weight="bold">47</text>
  <text x="470" y="258" fill="#94a3b8" font-size="10">totalKeysExamined:</text>
  <text x="610" y="258" fill="#e2e8f0" font-size="10">47</text>
  <text x="470" y="274" fill="#94a3b8" font-size="10">executionTimeMillis:</text>
  <text x="610" y="274" fill="#00ED64" font-size="10" font-weight="bold">2 ms</text>

  <!-- FAST label -->
  <rect x="500" y="295" width="130" height="26" rx="6" fill="#00191f" stroke="#00ED64"/>
  <text x="565" y="313" text-anchor="middle" fill="#00ED64" font-size="11" font-weight="bold">✓ RÁPIDO — eficiente</text>


  <!-- CENTER divider -->
  <line x1="380" y1="50" x2="380" y2="340" stroke="#00684A" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Bottom: Modes -->
  <rect x="30" y="335" width="700" height="34" rx="6" fill="#023430" stroke="#00684A"/>
  <text x="380" y="349" text-anchor="middle" fill="#94a3b8" font-size="10">Modos: </text>
  <text x="430" y="349" text-anchor="start" fill="#60a5fa" font-size="10">explain()</text>
  <text x="480" y="349" fill="#94a3b8" font-size="10">= queryPlanner  </text>
  <text x="560" y="349" fill="#60a5fa" font-size="10">explain("executionStats")</text>
  <text x="700" y="349" fill="#94a3b8" font-size="10">= + stats</text>
  <text x="380" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">Regla: nReturned ≈ totalDocsExamined → consulta eficiente</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
