<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 290" width="780" height="290" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="290" fill="#001E2B"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Tipos de Índices Simples en MongoDB</text>

  <!-- Index simple ascending -->
  <rect x="22" y="52" width="177" height="90" rx="6" fill="#023430"/>
  <text x="110" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#00ED64">Simple Asc</text>
  <rect x="30" y="80" width="161" height="30" rx="3" fill="#001E2B"/>
  <text x="110" y="100" text-anchor="middle" font-size="11" fill="#e2e8f0">{ email: 1 }</text>
  <text x="110" y="128" text-anchor="middle" font-size="10" fill="#94a3b8">find, sort, unique</text>

  <!-- Index simple descending -->
  <rect x="210" y="52" width="177" height="90" rx="6" fill="#023430"/>
  <text x="298" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#60a5fa">Simple Desc</text>
  <rect x="218" y="80" width="161" height="30" rx="3" fill="#001E2B"/>
  <text x="298" y="100" text-anchor="middle" font-size="11" fill="#e2e8f0">{ createdAt: -1 }</text>
  <text x="298" y="128" text-anchor="middle" font-size="10" fill="#94a3b8">sort desc · recientes primero</text>

  <!-- Unique -->
  <rect x="398" y="52" width="177" height="90" rx="6" fill="#023430"/>
  <text x="486" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">Único</text>
  <rect x="406" y="80" width="161" height="30" rx="3" fill="#001E2B"/>
  <text x="486" y="100" text-anchor="middle" font-size="11" fill="#e2e8f0">{ email: 1 }, {unique: true}</text>
  <text x="486" y="128" text-anchor="middle" font-size="10" fill="#94a3b8">no duplicados · error E11000</text>

  <!-- Multikey -->
  <rect x="586" y="52" width="172" height="90" rx="6" fill="#023430"/>
  <text x="672" y="73" text-anchor="middle" font-size="12" font-weight="600" fill="#f472b6">Multikey</text>
  <rect x="594" y="80" width="156" height="30" rx="3" fill="#001E2B"/>
  <text x="672" y="100" text-anchor="middle" font-size="11" fill="#e2e8f0">{ tags: 1 }</text>
  <text x="672" y="128" text-anchor="middle" font-size="10" fill="#94a3b8">indexa cada elemento del array</text>

  <!-- Subdoc index -->
  <rect x="22" y="162" width="177" height="90" rx="6" fill="#023430"/>
  <text x="110" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#34d399">Subdocumento</text>
  <rect x="30" y="190" width="161" height="30" rx="3" fill="#001E2B"/>
  <text x="110" y="210" text-anchor="middle" font-size="11" fill="#e2e8f0">{ "address.city": 1 }</text>
  <text x="110" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">dot notation · campo anidado</text>

  <!-- Sparse -->
  <rect x="210" y="162" width="177" height="90" rx="6" fill="#023430"/>
  <text x="298" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#fb923c">Sparse</text>
  <rect x="218" y="190" width="161" height="30" rx="3" fill="#001E2B"/>
  <text x="298" y="210" text-anchor="middle" font-size="11" fill="#e2e8f0">{ phone: 1 }, {sparse: true}</text>
  <text x="298" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">excluye docs sin ese campo</text>

  <!-- _id -->
  <rect x="398" y="162" width="360" height="90" rx="6" fill="#023430"/>
  <text x="578" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">_id (automático)</text>
  <rect x="406" y="190" width="344" height="30" rx="3" fill="#001E2B"/>
  <text x="578" y="210" text-anchor="middle" font-size="11" fill="#e2e8f0">{ _id: 1 }  — único por defecto en toda colección</text>
  <text x="578" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">No se puede eliminar · siempre presente</text>
</svg>
