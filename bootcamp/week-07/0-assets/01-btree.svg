<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" width="780" height="320" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="320" fill="#001E2B"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Índice B-Tree en MongoDB</text>

  <!-- Query box -->
  <rect x="290" y="52" width="200" height="32" rx="5" fill="#023430"/>
  <text x="390" y="73" text-anchor="middle" font-size="12" fill="#fbbf24">find({ category: "B" })</text>

  <!-- Arrow down -->
  <line x1="390" y1="84" x2="390" y2="104" stroke="#00684A" stroke-width="1.5"/>
  <polygon points="385,104 395,104 390,113" fill="#00684A"/>

  <!-- Root node -->
  <rect x="330" y="113" width="120" height="30" rx="4" fill="#00684A"/>
  <text x="390" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Nodo raíz: "E"</text>

  <!-- Branch arrows -->
  <line x1="330" y1="143" x2="230" y2="173" stroke="#00684A" stroke-width="1.5"/>
  <line x1="450" y1="143" x2="550" y2="173" stroke="#00684A" stroke-width="1.5"/>

  <!-- Left branch -->
  <rect x="160" y="173" width="140" height="30" rx="4" fill="#023430"/>
  <text x="230" y="193" text-anchor="middle" font-size="12" fill="#60a5fa">Nodo: "B", "C"</text>

  <!-- Right branch -->
  <rect x="480" y="173" width="140" height="30" rx="4" fill="#023430"/>
  <text x="550" y="193" text-anchor="middle" font-size="12" fill="#94a3b8">Nodo: "F", "H"</text>

  <!-- Left leaves arrow -->
  <line x1="195" y1="203" x2="160" y2="233" stroke="#00684A" stroke-width="1.2"/>
  <line x1="230" y1="203" x2="265" y2="233" stroke="#00684A" stroke-width="1.2"/>

  <!-- Leaves A, B, C -->
  <rect x="90" y="233" width="70" height="28" rx="3" fill="#001E2B"/>
  <text x="125" y="252" text-anchor="middle" font-size="11" fill="#94a3b8">"A" → doc</text>

  <rect x="195" y="233" width="70" height="28" rx="3" fill="#001E2B" stroke="#00ED64" stroke-width="1.5"/>
  <text x="230" y="252" text-anchor="middle" font-size="11" fill="#00ED64">"B" → doc ✓</text>

  <rect x="300" y="233" width="70" height="28" rx="3" fill="#001E2B"/>
  <text x="335" y="252" text-anchor="middle" font-size="11" fill="#94a3b8">"C" → doc</text>

  <!-- Right leaves D, E -->
  <line x1="530" y1="203" x2="460" y2="233" stroke="#00684A" stroke-width="1.2"/>
  <line x1="570" y1="203" x2="620" y2="233" stroke="#00684A" stroke-width="1.2"/>
  <rect x="410" y="233" width="70" height="28" rx="3" fill="#001E2B"/>
  <text x="445" y="252" text-anchor="middle" font-size="11" fill="#94a3b8">"F" → doc</text>
  <rect x="580" y="233" width="70" height="28" rx="3" fill="#001E2B"/>
  <text x="615" y="252" text-anchor="middle" font-size="11" fill="#94a3b8">"H" → doc</text>

  <!-- Info boxes -->
  <rect x="30" y="280" width="340" height="28" rx="4" fill="#023430"/>
  <text x="200" y="299" text-anchor="middle" font-size="11" fill="#00ED64">IXSCAN: 3 comparaciones para encontrar "B"</text>

  <rect x="385" y="280" width="365" height="28" rx="4" fill="#023430"/>
  <text x="567" y="299" text-anchor="middle" font-size="11" fill="#94a3b8">COLLSCAN: lee todos los documentos (O(n))</text>
</svg>
