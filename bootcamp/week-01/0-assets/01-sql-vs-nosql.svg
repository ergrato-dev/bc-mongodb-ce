<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="Inter,Roboto,'Open Sans',sans-serif">

  <!-- Fondo -->
  <rect width="760" height="440" fill="#001E2B"/>

  <!-- Barra de título -->
  <rect width="760" height="46" fill="#023430"/>
  <text x="380" y="30" text-anchor="middle" fill="#00ED64" font-size="16" font-weight="700">SQL vs NoSQL — Modelo Relacional vs Modelo Documental</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- COLUMNA IZQUIERDA: SQL                         -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Header SQL -->
  <rect x="20" y="56" width="340" height="34" rx="5" fill="#1e3a5f"/>
  <text x="190" y="79" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">SQL — Base de Datos Relacional</text>

  <!-- Tabla: products -->
  <text x="34" y="112" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">TABLA: products</text>
  <rect x="28" y="118" width="322" height="24" rx="3" fill="#1e3a5f"/>
  <text x="44" y="134" fill="#60a5fa" font-size="11" font-weight="600">id</text>
  <text x="92" y="134" fill="#60a5fa" font-size="11" font-weight="600">name</text>
  <text x="188" y="134" fill="#60a5fa" font-size="11" font-weight="600">price</text>
  <text x="260" y="134" fill="#60a5fa" font-size="11" font-weight="600">fk_spec_id</text>

  <rect x="28" y="142" width="322" height="22" rx="0" fill="#0f172a"/>
  <text x="44" y="157" fill="#e2e8f0" font-size="10">1</text>
  <text x="92" y="157" fill="#e2e8f0" font-size="10">Laptop Pro 15</text>
  <text x="188" y="157" fill="#e2e8f0" font-size="10">1299.99</text>
  <text x="260" y="157" fill="#fbbf24" font-size="10">→ 101</text>

  <rect x="28" y="164" width="322" height="22" rx="0" fill="#001E2B"/>
  <text x="44" y="179" fill="#e2e8f0" font-size="10">2</text>
  <text x="92" y="179" fill="#e2e8f0" font-size="10">Wireless Mouse</text>
  <text x="188" y="179" fill="#e2e8f0" font-size="10">49.99</text>
  <text x="260" y="179" fill="#fbbf24" font-size="10">→ 102</text>

  <!-- Flecha FK -->
  <line x1="295" y1="157" x2="340" y2="220" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="295" y1="179" x2="340" y2="240" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Tabla: specs -->
  <text x="34" y="210" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">TABLA: specs (JOIN necesario)</text>
  <rect x="28" y="216" width="322" height="24" rx="3" fill="#1e3a5f"/>
  <text x="44" y="232" fill="#60a5fa" font-size="11" font-weight="600">id</text>
  <text x="92" y="232" fill="#60a5fa" font-size="11" font-weight="600">ram</text>
  <text x="180" y="232" fill="#60a5fa" font-size="11" font-weight="600">storage</text>

  <rect x="28" y="240" width="322" height="22" fill="#0f172a"/>
  <text x="44" y="255" fill="#e2e8f0" font-size="10">101</text>
  <text x="92" y="255" fill="#e2e8f0" font-size="10">16GB</text>
  <text x="180" y="255" fill="#e2e8f0" font-size="10">512GB</text>

  <rect x="28" y="262" width="322" height="22" fill="#001E2B"/>
  <text x="44" y="277" fill="#e2e8f0" font-size="10">102</text>
  <text x="92" y="277" fill="#e2e8f0" font-size="10">—</text>
  <text x="180" y="277" fill="#e2e8f0" font-size="10">—</text>

  <!-- Query SQL -->
  <rect x="28" y="298" width="322" height="50" rx="4" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="44" y="316" fill="#60a5fa" font-size="10">SELECT</text>
  <text x="96" y="316" fill="#86efac" font-size="10"> p.name, p.price, s.ram</text>
  <text x="44" y="332" fill="#60a5fa" font-size="10">FROM</text>
  <text x="84" y="332" fill="#e2e8f0" font-size="10"> products p</text>
  <text x="44" y="348" fill="#60a5fa" font-size="10">JOIN</text>
  <text x="80" y="348" fill="#e2e8f0" font-size="10"> specs s ON p.fk_spec_id = s.id</text>

  <!-- Pain points SQL -->
  <text x="28" y="376" fill="#f87171" font-size="10">❌ Esquema fijo — alterar tabla es costoso</text>
  <text x="28" y="393" fill="#f87171" font-size="10">❌ JOIN necesario para datos relacionados</text>
  <text x="28" y="410" fill="#f87171" font-size="10">❌ Filas deben tener los mismos campos</text>

  <!-- Divisor central -->
  <line x1="385" y1="56" x2="385" y2="430" stroke="#00684A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="385" y="248" text-anchor="middle" fill="#00684A" font-size="20" font-weight="700" transform="rotate(-90 385 248)">vs</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- COLUMNA DERECHA: MongoDB                       -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Header MongoDB -->
  <rect x="400" y="56" width="340" height="34" rx="5" fill="#023430"/>
  <text x="570" y="79" text-anchor="middle" fill="#00ED64" font-size="14" font-weight="700">MongoDB — Base de Datos Documental</text>

  <!-- Colección: products -->
  <text x="414" y="112" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">COLECCIÓN: products</text>

  <!-- Documento 1 -->
  <rect x="408" y="118" width="322" height="112" rx="4" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="424" y="137" fill="#86efac" font-size="10">// Documento 1</text>
  <text x="424" y="153" fill="#94a3b8" font-size="10">"name":</text>
  <text x="466" y="153" fill="#e2e8f0" font-size="10"> "Laptop Pro 15"</text>
  <text x="424" y="169" fill="#94a3b8" font-size="10">"price":</text>
  <text x="466" y="169" fill="#93c5fd" font-size="10"> Decimal128("1299.99")</text>
  <text x="424" y="185" fill="#94a3b8" font-size="10">"specs": {</text>
  <text x="442" y="201" fill="#94a3b8" font-size="10">"ram": "16GB",  "storage": "512GB"</text>
  <text x="424" y="217" fill="#94a3b8" font-size="10">}</text>

  <!-- Documento 2 -->
  <rect x="408" y="240" width="322" height="100" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="424" y="259" fill="#86efac" font-size="10">// Documento 2 — campos distintos, ambos válidos ✅</text>
  <text x="424" y="275" fill="#94a3b8" font-size="10">"name":</text>
  <text x="466" y="275" fill="#e2e8f0" font-size="10"> "Wireless Mouse"</text>
  <text x="424" y="291" fill="#94a3b8" font-size="10">"price":</text>
  <text x="466" y="291" fill="#93c5fd" font-size="10"> Decimal128("49.99")</text>
  <text x="424" y="307" fill="#94a3b8" font-size="10">"color":</text>
  <text x="466" y="307" fill="#e2e8f0" font-size="10"> "black"</text>
  <text x="424" y="323" fill="#fde68a" font-size="9" font-style="italic">← sin campo "specs" — no hay error</text>

  <!-- Query MongoDB -->
  <rect x="408" y="350" width="322" height="34" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="424" y="365" fill="#86efac" font-size="10">db.products.find(</text>
  <text x="424" y="381" fill="#e2e8f0" font-size="10">  {}, { name:1, price:1, "specs.ram":1 })</text>

  <!-- Ventajas MongoDB -->
  <text x="408" y="408" fill="#86efac" font-size="10">✅ Datos anidados — sin JOIN necesario</text>
  <text x="408" y="424" fill="#86efac" font-size="10">✅ Esquema flexible — cada doc puede variar</text>

</svg>
