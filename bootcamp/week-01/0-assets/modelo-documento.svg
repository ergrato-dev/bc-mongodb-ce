<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460" font-family="Inter,Roboto,'Open Sans',sans-serif">

  <!-- Fondo -->
  <rect width="760" height="460" fill="#001E2B"/>

  <!-- Barra de título -->
  <rect width="760" height="46" fill="#023430"/>
  <text x="380" y="30" text-anchor="middle" fill="#00ED64" font-size="16" font-weight="700">Modelo de Documento — MongoDB 7.0</text>

  <!-- ───────────────────────────────────────── -->
  <!-- SECCIÓN IZQUIERDA: Jerarquía             -->
  <!-- ───────────────────────────────────────── -->

  <text x="30" y="70" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">JERARQUÍA</text>

  <!-- Database -->
  <rect x="25" y="78" width="320" height="34" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="42" y="100" fill="#94a3b8" font-size="12">servidor /</text>
  <text x="108" y="100" fill="#e2e8f0" font-size="12" font-weight="600"> database:</text>
  <text x="195" y="100" fill="#00ED64" font-size="12" font-weight="700"> bootcamp_db</text>

  <!-- Flecha DB → colecciones -->
  <line x1="185" y1="112" x2="185" y2="128" stroke="#00684A" stroke-width="1.5"/>
  <polygon points="180,128 190,128 185,136" fill="#00684A"/>

  <!-- Etiqueta colecciones -->
  <text x="185" y="148" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">COLECCIONES</text>

  <!-- Colección users -->
  <rect x="25" y="154" width="82" height="28" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="66" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">users</text>

  <!-- Colección products (activa) -->
  <rect x="117" y="154" width="136" height="28" rx="4" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="185" y="172" text-anchor="middle" fill="#00ED64" font-size="11" font-weight="700">products</text>

  <!-- Colección orders -->
  <rect x="263" y="154" width="82" height="28" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="304" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">orders</text>

  <!-- Flecha products → documentos -->
  <line x1="185" y1="182" x2="185" y2="198" stroke="#00ED64" stroke-width="1.5"/>
  <polygon points="180,198 190,198 185,206" fill="#00ED64"/>

  <!-- Etiqueta documentos -->
  <text x="185" y="216" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">DOCUMENTOS</text>

  <!-- Documento 1 (gris) -->
  <rect x="78" y="222" width="52" height="34" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="104" y="243" text-anchor="middle" fill="#94a3b8" font-size="14">{ }</text>

  <!-- Documento 2 (activo, verde) -->
  <rect x="140" y="222" width="90" height="34" rx="4" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="185" y="243" text-anchor="middle" fill="#00ED64" font-size="14" font-weight="700">{ }</text>

  <!-- Documento 3 (gris) -->
  <rect x="240" y="222" width="52" height="34" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="266" y="243" text-anchor="middle" fill="#94a3b8" font-size="14">{ }</text>

  <!-- Ellipsis -->
  <text x="302" y="246" fill="#94a3b8" font-size="18">···</text>

  <!-- Flecha doc activo → expanded (hacia la derecha) -->
  <line x1="230" y1="239" x2="363" y2="239" stroke="#00ED64" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="359,234 369,239 359,244" fill="#00ED64"/>

  <!-- Caja esquema flexible -->
  <rect x="25" y="276" width="320" height="168" rx="6" fill="#001E2B" stroke="#00684A" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="185" y="298" text-anchor="middle" fill="#00ED64" font-size="12" font-weight="700">⚡ Esquema flexible</text>
  <text x="42" y="318" fill="#94a3b8" font-size="11">Documentos en la misma colección</text>
  <text x="42" y="334" fill="#94a3b8" font-size="11">pueden tener campos distintos:</text>
  <text x="42" y="358" fill="#86efac" font-size="10">// doc 1</text>
  <text x="42" y="374" fill="#e2e8f0" font-size="10">{ name: "Laptop", price: 1299, stock: 5 }</text>
  <text x="42" y="398" fill="#86efac" font-size="10">// doc 2 — sin stock, campo extra</text>
  <text x="42" y="414" fill="#e2e8f0" font-size="10">{ name: "Mouse", price: 49, color: "black" }</text>
  <text x="42" y="434" fill="#94a3b8" font-size="10" font-style="italic">✅ Ambos válidos en products</text>

  <!-- Divisor vertical -->
  <line x1="375" y1="46" x2="375" y2="450" stroke="#00684A" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- ───────────────────────────────────────── -->
  <!-- SECCIÓN DERECHA: Documento expandido     -->
  <!-- ───────────────────────────────────────── -->

  <text x="392" y="70" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">DOCUMENTO</text>

  <!-- Caja del documento -->
  <rect x="388" y="78" width="352" height="370" rx="6" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>

  <!-- Encabezado del documento -->
  <rect x="388" y="78" width="352" height="26" rx="6" fill="#00684A" opacity="0.65"/>
  <rect x="388" y="90" width="352" height="14" fill="#00684A" opacity="0.65"/>
  <text x="404" y="96" fill="#00ED64" font-size="11" font-weight="700">{ documento en products }</text>

  <!-- Campo: _id -->
  <text x="404" y="124" fill="#94a3b8" font-size="11">"_id":</text>
  <text x="436" y="124" fill="#fbbf24" font-size="11">ObjectId("64a7f3b2...")</text>
  <rect x="626" y="114" width="98" height="14" rx="3" fill="#78350f" opacity="0.7"/>
  <text x="675" y="125" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">ObjectId</text>

  <!-- Campo: name -->
  <text x="404" y="146" fill="#94a3b8" font-size="11">"name":</text>
  <text x="441" y="146" fill="#86efac" font-size="11">"Laptop Pro 15"</text>
  <rect x="626" y="136" width="98" height="14" rx="3" fill="#14532d" opacity="0.7"/>
  <text x="675" y="147" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">String</text>

  <!-- Campo: price -->
  <text x="404" y="168" fill="#94a3b8" font-size="11">"price":</text>
  <text x="441" y="168" fill="#93c5fd" font-size="11">Decimal128("1299.99")</text>
  <rect x="626" y="158" width="98" height="14" rx="3" fill="#1e3a5f" opacity="0.7"/>
  <text x="675" y="169" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">Decimal128</text>

  <!-- Campo: stock -->
  <text x="404" y="190" fill="#94a3b8" font-size="11">"stock":</text>
  <text x="441" y="190" fill="#93c5fd" font-size="11">NumberInt(42)</text>
  <rect x="626" y="180" width="98" height="14" rx="3" fill="#1e3a5f" opacity="0.7"/>
  <text x="675" y="191" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">NumberInt</text>

  <!-- Campo: isActive -->
  <text x="404" y="212" fill="#94a3b8" font-size="11">"isActive":</text>
  <text x="453" y="212" fill="#f9a8d4" font-size="11">true</text>
  <rect x="626" y="202" width="98" height="14" rx="3" fill="#500724" opacity="0.7"/>
  <text x="675" y="213" text-anchor="middle" fill="#f9a8d4" font-size="9" font-weight="600">Boolean</text>

  <!-- Campo: tags -->
  <text x="404" y="234" fill="#94a3b8" font-size="11">"tags":</text>
  <text x="436" y="234" fill="#fde68a" font-size="11">[ "tech", "laptop" ]</text>
  <rect x="626" y="224" width="98" height="14" rx="3" fill="#713f12" opacity="0.7"/>
  <text x="675" y="235" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600">Array</text>

  <!-- Campo: specs (subdocumento) -->
  <text x="404" y="256" fill="#94a3b8" font-size="11">"specs": {</text>
  <rect x="626" y="246" width="98" height="14" rx="3" fill="#292524" opacity="0.8"/>
  <text x="675" y="257" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">Object</text>

  <text x="422" y="276" fill="#94a3b8" font-size="11">"ram": "16GB",</text>
  <text x="422" y="294" fill="#94a3b8" font-size="11">"storage": "512GB"</text>
  <text x="404" y="312" fill="#94a3b8" font-size="11">}</text>

  <!-- Campo: createdAt -->
  <text x="404" y="334" fill="#94a3b8" font-size="11">"createdAt":</text>
  <text x="456" y="334" fill="#c4b5fd" font-size="11">ISODate("2024-01-15")</text>
  <rect x="626" y="324" width="98" height="14" rx="3" fill="#2e1065" opacity="0.7"/>
  <text x="675" y="335" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Date</text>

  <!-- Campo: brand -->
  <text x="404" y="356" fill="#94a3b8" font-size="11">"brand":</text>
  <text x="441" y="356" fill="#86efac" font-size="11">"TechCorp"</text>

  <!-- Campo: category -->
  <text x="404" y="376" fill="#94a3b8" font-size="11">"category":</text>
  <text x="455" y="376" fill="#86efac" font-size="11">"laptops"</text>

  <!-- Nota _id automático -->
  <rect x="404" y="394" width="320" height="38" rx="4" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="564" y="409" text-anchor="middle" fill="#00ED64" font-size="10" font-weight="700">💡 _id se genera automáticamente</text>
  <text x="564" y="424" text-anchor="middle" fill="#94a3b8" font-size="10">No es necesario declararlo al insertar.</text>

</svg>
