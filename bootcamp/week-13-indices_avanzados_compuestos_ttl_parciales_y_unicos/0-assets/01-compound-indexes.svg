<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <rect width="760" height="400" fill="#001E2B"/>
  <text x="380" y="28" font-family="Inter,Roboto,sans-serif" font-size="15" font-weight="700" fill="#00ED64" text-anchor="middle">Índices Compuestos — Regla ESR</text>

  <!-- ESR labels -->
  <rect x="20" y="45" width="220" height="50" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="130" y="64" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Regla ESR para índices compuestos</text>
  <text x="55" y="83" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#00ED64" font-weight="700">E</text>
  <text x="65" y="83" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">quality →</text>
  <text x="125" y="83" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#fbbf24" font-weight="700">S</text>
  <text x="135" y="83" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">ort →</text>
  <text x="185" y="83" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#60a5fa" font-weight="700">R</text>
  <text x="195" y="83" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">ange</text>

  <!-- Query example -->
  <rect x="260" y="45" width="480" height="50" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="270" y="63" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">Query:</text>
  <text x="316" y="63" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#00ED64">status: "completed"</text>
  <text x="445" y="63" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">(E)</text>
  <text x="270" y="82" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#fbbf24">.sort({ orderDate: -1 })</text>
  <text x="415" y="82" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">(S)</text>
  <text x="440" y="82" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#60a5fa">price: { $gt: 100 }</text>
  <text x="570" y="82" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">(R)</text>

  <!-- Index -->
  <rect x="20" y="120" width="720" height="60" rx="6" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="30" y="142" font-family="Inter,Roboto,sans-serif" font-size="11" fill="#e2e8f0">Índice ESR correcto:</text>
  <text x="160" y="142" font-family="Inter,Roboto,sans-serif" font-size="11" fill="#e2e8f0">db.orders.createIndex({</text>
  <text x="350" y="142" font-family="Inter,Roboto,sans-serif" font-size="11" fill="#00ED64" font-weight="700">status: 1</text>
  <text x="430" y="142" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">(E)</text>
  <text x="455" y="142" font-family="Inter,Roboto,sans-serif" font-size="11" fill="#fbbf24" font-weight="700">orderDate: -1</text>
  <text x="565" y="142" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">(S)</text>
  <text x="590" y="142" font-family="Inter,Roboto,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">price: 1</text>
  <text x="645" y="142" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">(R)</text>
  <text x="670" y="142" font-family="Inter,Roboto,sans-serif" font-size="11" fill="#e2e8f0">})</text>
  <text x="30" y="165" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Prefix rule: cualquier query que empiece por "status" puede usar este índice</text>

  <!-- Three examples of prefix use -->
  <text x="20" y="205" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#94a3b8">Prefijos del índice { status, orderDate, price }</text>

  <!-- prefix 1 -->
  <rect x="20" y="215" width="220" height="65" rx="5" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="130" y="234" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">{ status }</text>
  <text x="130" y="250" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">find({ status: "completed" })</text>
  <text x="130" y="265" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64" text-anchor="middle">✅ Usa el índice</text>
  <text x="130" y="275" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(prefijo de 1 campo)</text>

  <!-- prefix 2 -->
  <rect x="260" y="215" width="220" height="65" rx="5" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="370" y="234" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">{ status, orderDate }</text>
  <text x="370" y="250" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">find({ status:... }).sort({ orderDate:-1 })</text>
  <text x="370" y="265" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64" text-anchor="middle">✅ Usa el índice</text>
  <text x="370" y="275" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(prefijo de 2 campos)</text>

  <!-- non-prefix -->
  <rect x="500" y="215" width="240" height="65" rx="5" fill="#023430" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="234" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">{ orderDate } solo</text>
  <text x="620" y="250" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">find({ orderDate: { $gt: date } })</text>
  <text x="620" y="265" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">❌ No usa el índice</text>
  <text x="620" y="275" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(no es prefijo del índice)</text>

  <!-- explain note -->
  <rect x="20" y="300" width="720" height="80" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="30" y="318" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#fbbf24">Verificación con explain("executionStats")</text>
  <text x="30" y="335" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">winningPlan.stage:</text>
  <text x="155" y="335" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#00ED64">"IXSCAN"</text>
  <text x="220" y="335" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">→ Usa el índice correctamente</text>
  <text x="30" y="352" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">winningPlan.stage:</text>
  <text x="155" y="352" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#ef4444">"COLLSCAN"</text>
  <text x="230" y="352" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">→ Escanea toda la colección (ineficiente)</text>
  <text x="30" y="369" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">executionStats.totalDocsExamined:</text>
  <text x="245" y="369" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#00ED64">"0"</text>
  <text x="268" y="369" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#94a3b8">→ Covered query (solo lee el índice)</text>
</svg>
