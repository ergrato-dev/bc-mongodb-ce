<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#001E2B"/>
  <text x="380" y="28" font-family="Inter,Roboto,sans-serif" font-size="15" font-weight="700" fill="#00ED64" text-anchor="middle">Índice Parcial — Solo Indexa Documentos que Cumplen la Condición</text>

  <!-- Collection: all docs -->
  <text x="130" y="55" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">Colección orders (8 docs)</text>

  <!-- docs -->
  <rect x="20" y="63" width="220" height="195" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <!-- completed docs (green) -->
  <rect x="30" y="72" width="200" height="22" rx="3" fill="#00684A"/>
  <text x="135" y="87" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">status: "completed" | price: 250</text>
  <rect x="30" y="97" width="200" height="22" rx="3" fill="#00684A"/>
  <text x="135" y="112" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">status: "completed" | price: 80</text>
  <rect x="30" y="122" width="200" height="22" rx="3" fill="#00684A"/>
  <text x="135" y="137" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">status: "completed" | price: 430</text>
  <rect x="30" y="147" width="200" height="22" rx="3" fill="#00684A"/>
  <text x="135" y="162" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">status: "completed" | price: 120</text>
  <!-- non-completed docs (gray) -->
  <rect x="30" y="174" width="200" height="18" rx="3" fill="#001E2B"/>
  <text x="135" y="187" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">status: "pending" | price: 60</text>
  <rect x="30" y="195" width="200" height="18" rx="3" fill="#001E2B"/>
  <text x="135" y="208" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">status: "cancelled" | price: 200</text>
  <rect x="30" y="216" width="200" height="18" rx="3" fill="#001E2B"/>
  <text x="135" y="229" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">status: "pending" | price: 90</text>
  <rect x="30" y="237" width="200" height="18" rx="3" fill="#001E2B"/>
  <text x="135" y="250" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">status: "cancelled" | price: 340</text>

  <!-- Arrow to partial index -->
  <line x1="240" y1="160" x2="290" y2="160" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arrg)"/>

  <!-- Partial Index box -->
  <text x="460" y="55" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#00ED64" text-anchor="middle">Índice Parcial (solo "completed")</text>
  <rect x="300" y="63" width="200" height="115" rx="5" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="400" y="80" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">{ customerId:1, price:1 }</text>
  <text x="400" y="93" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">partialFilterExpression:</text>
  <text x="400" y="105" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle">{ status: "completed" }</text>
  <line x1="310" y1="112" x2="490" y2="112" stroke="#00684A" stroke-width="0.8"/>
  <rect x="315" y="118" width="170" height="16" rx="3" fill="#00684A"/>
  <text x="400" y="130" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">ptr → price:250 (cust-01)</text>
  <rect x="315" y="137" width="170" height="16" rx="3" fill="#00684A"/>
  <text x="400" y="149" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">ptr → price:80 (cust-02)</text>
  <rect x="315" y="156" width="170" height="16" rx="3" fill="#00684A"/>
  <text x="400" y="168" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">ptr → price:120 (cust-01)</text>

  <!-- Size comparison -->
  <rect x="520" y="63" width="220" height="115" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1.5"/>
  <text x="630" y="82" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Tamaño del índice</text>
  <line x1="530" y1="90" x2="730" y2="90" stroke="#00684A" stroke-width="0.8"/>
  <text x="540" y="107" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Índice normal:</text>
  <rect x="640" y="97" width="90" height="14" rx="3" fill="#023430" stroke="#ef4444" stroke-width="1"/>
  <text x="685" y="108" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">8 entradas</text>
  <text x="540" y="130" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Índice parcial:</text>
  <rect x="640" y="120" width="90" height="14" rx="3" fill="#00684A"/>
  <text x="685" y="131" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">4 entradas</text>
  <text x="630" y="153" font-family="Inter,Roboto,sans-serif" font-size="10" fill="#00ED64" text-anchor="middle">50% menos espacio</text>
  <text x="630" y="168" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Menos escrituras al actualizar</text>

  <!-- Query examples -->
  <rect x="20" y="280" width="340" height="85" rx="5" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="190" y="298" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">✅ Usa el índice parcial</text>
  <text x="35" y="314" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Query incluye la condición del filtro:</text>
  <text x="35" y="328" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.orders.find({</text>
  <text x="45" y="342" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">status: "completed",</text>
  <text x="45" y="356" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">customerId: "cust-01" })</text>

  <rect x="400" y="280" width="340" height="85" rx="5" fill="#023430" stroke="#ef4444" stroke-width="1.5"/>
  <text x="570" y="298" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">❌ No usa el índice parcial</text>
  <text x="415" y="314" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Query sin la condición del filtro:</text>
  <text x="415" y="328" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.orders.find({</text>
  <text x="425" y="342" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// status no incluido en la query</text>
  <text x="425" y="356" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">customerId: "cust-01" })</text>

  <defs>
    <marker id="arrg" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
  </defs>
</svg>
