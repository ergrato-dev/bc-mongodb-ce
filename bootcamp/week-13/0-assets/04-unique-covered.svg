<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#001E2B"/>
  <text x="380" y="28" font-family="Inter,Roboto,sans-serif" font-size="15" font-weight="700" fill="#00ED64" text-anchor="middle">Índice Único y Covered Query</text>

  <!-- LEFT: Unique Index -->
  <text x="185" y="52" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0" text-anchor="middle">Índice Único</text>

  <rect x="20" y="63" width="330" height="185" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>

  <!-- existing users -->
  <text x="35" y="83" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Colección users (documentos existentes):</text>
  <rect x="35" y="90" width="140" height="16" rx="3" fill="#00684A"/>
  <text x="105" y="102" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">email: "ana@mail.com"</text>
  <rect x="185" y="90" width="150" height="16" rx="3" fill="#00684A"/>
  <text x="260" y="102" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">email: "carlos@mail.com"</text>

  <!-- unique index creation -->
  <text x="35" y="123" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Crear índice único:</text>
  <rect x="35" y="130" width="295" height="28" rx="3" fill="#001E2B"/>
  <text x="50" y="143" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users</text>
  <text x="97" y="143" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">.createIndex({ email: 1 }, { unique: true })</text>
  <text x="50" y="155" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Garantiza que no hay duplicados</text>

  <!-- insert duplicate attempt -->
  <text x="35" y="176" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Intentar insertar email duplicado:</text>
  <rect x="35" y="183" width="295" height="16" rx="3" fill="#001E2B"/>
  <text x="50" y="195" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.users.insertOne({ email: "ana@mail.com" })</text>

  <!-- error box -->
  <rect x="35" y="206" width="295" height="30" rx="3" fill="#1a0505" stroke="#ef4444" stroke-width="1.5"/>
  <text x="183" y="218" font-family="Inter,Roboto,sans-serif" font-size="9" font-weight="700" fill="#ef4444" text-anchor="middle">MongoServerError: E11000</text>
  <text x="183" y="230" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#ef4444" text-anchor="middle">duplicate key error — index: users.$email_1</text>

  <!-- RIGHT: Covered Query -->
  <text x="565" y="52" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0" text-anchor="middle">Covered Query (Consulta Cubierta)</text>

  <rect x="410" y="63" width="330" height="185" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>

  <!-- index creation -->
  <text x="425" y="83" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Índice compuesto sobre campos proyectados:</text>
  <rect x="425" y="90" width="300" height="28" rx="3" fill="#001E2B"/>
  <text x="440" y="103" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users</text>
  <text x="482" y="103" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">.createIndex({</text>
  <text x="495" y="115" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#60a5fa">email: 1, role: 1, isActive: 1</text>
  <text x="480" y="125" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">})</text>

  <!-- query -->
  <text x="425" y="143" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Covered query — solo usa el índice:</text>
  <rect x="425" y="150" width="300" height="42" rx="3" fill="#001E2B"/>
  <text x="440" y="163" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users</text>
  <text x="482" y="163" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">.find({ isActive: true, role: "admin" },</text>
  <text x="440" y="177" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">{ email: 1, role: 1, isActive: 1,</text>
  <text x="440" y="189" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">_id: 0 })</text>
  <text x="440" y="197" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8">// _id: 0 es obligatorio</text>

  <!-- explain result -->
  <rect x="425" y="210" width="300" height="28" rx="3" fill="#001E2B" stroke="#00ED64" stroke-width="1"/>
  <text x="575" y="223" font-family="Inter,Roboto,sans-serif" font-size="9" font-weight="700" fill="#00ED64" text-anchor="middle">explain() resultado:</text>
  <text x="575" y="234" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0" text-anchor="middle">totalDocsExamined: 0 | stage: IXSCAN</text>

  <!-- Bottom legend row -->
  <rect x="20" y="270" width="335" height="95" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="188" y="288" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">Comandos de Gestión de Índices</text>
  <text x="35" y="306" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Listar índices:</text>
  <text x="125" y="306" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users.getIndexes()</text>
  <text x="35" y="322" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Eliminar índice:</text>
  <text x="125" y="322" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users.dropIndex("email_1")</text>
  <text x="35" y="338" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Ver uso real:</text>
  <text x="125" y="338" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users.aggregate([$indexStats: {}])</text>
  <text x="35" y="352" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Analizar query:</text>
  <text x="125" y="352" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.users.find(…).explain("executionStats")</text>

  <!-- Bottom right: when covered query works -->
  <rect x="410" y="270" width="330" height="95" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="575" y="288" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">Condiciones para Covered Query</text>
  <text x="425" y="306" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64">✅ Todos los campos proyectados están en el índice</text>
  <text x="425" y="321" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64">✅ Proyección excluye _id: 0 explícitamente</text>
  <text x="425" y="336" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#ef4444">❌ El documento NO se lee desde el disco</text>
  <text x="425" y="351" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#60a5fa">→ totalDocsExamined: 0</text>
  <text x="425" y="360" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">   Respuesta instantánea en colecciones grandes</text>
</svg>
