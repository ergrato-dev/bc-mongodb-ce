<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="340" fill="#001E2B"/>
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Combinando Lógica y Arrays</text>

  <!-- Main query block -->
  <rect x="40" y="55" width="700" height="195" rx="8" fill="#023430"/>

  <text x="60" y="80" font-size="13" fill="#94a3b8">db.products.find({</text>
  <text x="80" y="103" font-size="13" fill="#00ED64">  inStock:</text>
  <text x="210" y="103" font-size="13" fill="#e2e8f0">true,</text>

  <text x="80" y="126" font-size="13" fill="#fbbf24">  $or: [</text>

  <text x="100" y="148" font-size="13" fill="#94a3b8">    {</text>
  <text x="120" y="148" font-size="13" fill="#60a5fa">tags: { $all: ["gaming","wireless"] }</text>
  <text x="96" y="148" font-size="13" fill="#94a3b8">}</text>

  <text x="100" y="168" font-size="13" fill="#94a3b8">    {</text>
  <text x="120" y="168" font-size="13" fill="#ef4444">ratings: { $elemMatch: { $gte: 4.5 } }</text>
  <text x="96" y="168" font-size="13" fill="#94a3b8">}</text>

  <text x="80" y="191" font-size="13" fill="#fbbf24">  ]</text>
  <text x="60" y="211" font-size="13" fill="#94a3b8">})</text>
  <text x="60" y="234" font-size="13" fill="#94a3b8">// Resultado: en stock AND (tiene ambos tags OR algún rating >= 4.5)</text>

  <!-- Legend -->
  <rect x="40" y="268" width="700" height="58" rx="6" fill="#001E2B" stroke="#1e3a4a" stroke-width="1"/>
  <rect x="55" y="280" width="12" height="12" rx="2" fill="#00ED64"/>
  <text x="75" y="291" font-size="11" fill="#e2e8f0">Campo directo: AND implícito</text>
  <rect x="240" y="280" width="12" height="12" rx="2" fill="#fbbf24"/>
  <text x="260" y="291" font-size="11" fill="#e2e8f0">$or: al menos una alternativa</text>
  <rect x="440" y="280" width="12" height="12" rx="2" fill="#60a5fa"/>
  <text x="460" y="291" font-size="11" fill="#e2e8f0">$all: todos los elementos presentes</text>
  <rect x="55" y="302" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="75" y="313" font-size="11" fill="#e2e8f0">$elemMatch: elemento cumple condición compuesta</text>
  <text x="440" y="313" font-size="11" fill="#94a3b8">Patrón: campos fijos → $or al final</text>
</svg>
