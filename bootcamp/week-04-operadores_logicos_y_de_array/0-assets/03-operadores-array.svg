<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" width="780" height="360" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="360" fill="#001E2B"/>
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Operadores de Array</text>

  <!-- Document with array field -->
  <rect x="30" y="55" width="200" height="185" rx="6" fill="#023430"/>
  <text x="130" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Documento</text>
  <text x="45" y="95" font-size="11" fill="#94a3b8">_id: ObjectId(…)</text>
  <text x="45" y="113" font-size="11" fill="#94a3b8">name: "Item A"</text>
  <text x="45" y="131" font-size="11" fill="#60a5fa">tags: [</text>
  <text x="65" y="148" font-size="11" fill="#e2e8f0">"nosql",</text>
  <text x="65" y="163" font-size="11" fill="#e2e8f0">"database",</text>
  <text x="65" y="178" font-size="11" fill="#e2e8f0">"mongodb"</text>
  <text x="45" y="195" font-size="11" fill="#60a5fa">]</text>
  <text x="45" y="215" font-size="11" fill="#fbbf24">scores: [72, 88, 92]</text>

  <!-- $all box -->
  <rect x="260" y="55" width="220" height="90" rx="6" fill="#023430"/>
  <text x="370" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#00ED64">$all</text>
  <text x="370" y="93" text-anchor="middle" font-size="11" fill="#94a3b8">Array contiene TODOS los valores</text>
  <rect x="270" y="100" width="200" height="35" rx="4" fill="#001E2B"/>
  <text x="370" y="115" text-anchor="middle" font-size="11" fill="#e2e8f0">{ tags: { $all: ["nosql","database"] } }</text>
  <text x="370" y="130" text-anchor="middle" font-size="10" fill="#00ED64">✓ "nosql" ∈ tags AND "database" ∈ tags</text>

  <!-- $elemMatch box -->
  <rect x="260" y="160" width="220" height="100" rx="6" fill="#023430"/>
  <text x="370" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">$elemMatch</text>
  <text x="370" y="198" text-anchor="middle" font-size="11" fill="#94a3b8">Un elemento cumple TODAS las cond.</text>
  <rect x="270" y="205" width="200" height="45" rx="4" fill="#001E2B"/>
  <text x="370" y="221" text-anchor="middle" font-size="11" fill="#e2e8f0">{ scores: { $elemMatch:</text>
  <text x="370" y="237" text-anchor="middle" font-size="11" fill="#e2e8f0">  { $gt: 85, $lt: 95 } } }</text>
  <text x="370" y="252" text-anchor="middle" font-size="10" fill="#fbbf24">✓ 88 &gt; 85 AND 88 &lt; 95</text>

  <!-- $size box -->
  <rect x="510" y="55" width="220" height="80" rx="6" fill="#023430"/>
  <text x="620" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">$size</text>
  <text x="620" y="93" text-anchor="middle" font-size="11" fill="#94a3b8">Array tiene N elementos exactos</text>
  <rect x="520" y="100" width="200" height="25" rx="4" fill="#001E2B"/>
  <text x="620" y="117" text-anchor="middle" font-size="11" fill="#e2e8f0">{ tags: { $size: 3 } }</text>

  <!-- Comparison $in vs $elemMatch -->
  <rect x="30" y="265" width="720" height="80" rx="6" fill="#023430"/>
  <text x="390" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">$in vs $elemMatch en arrays</text>
  <text x="200" y="304" text-anchor="middle" font-size="11" fill="#60a5fa">$in</text>
  <text x="200" y="319" text-anchor="middle" font-size="11" fill="#94a3b8">{ scores: { $in: [88, 92] } }</text>
  <text x="200" y="334" text-anchor="middle" font-size="10" fill="#94a3b8">¿88 ∈ scores OR 92 ∈ scores?</text>
  <line x1="390" y1="300" x2="390" y2="340" stroke="#1e3a4a" stroke-width="1"/>
  <text x="575" y="304" text-anchor="middle" font-size="11" fill="#fbbf24">$elemMatch</text>
  <text x="575" y="319" text-anchor="middle" font-size="11" fill="#94a3b8">{ scores: { $elemMatch: {$gt:85,$lt:95} } }</text>
  <text x="575" y="334" text-anchor="middle" font-size="10" fill="#94a3b8">¿Algún elemento &gt;85 AND &lt;95?</text>
</svg>
