<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="340" fill="#001E2B"/>
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">$and y $or — Lógica Explícita</text>

  <!-- AND section -->
  <rect x="40" y="55" width="330" height="200" rx="8" fill="#023430"/>
  <text x="205" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#00ED64">$and / AND implícito</text>
  <text x="205" y="98" text-anchor="middle" font-size="11" fill="#94a3b8">TODOS los criterios deben cumplirse</text>

  <!-- Circles overlap -->
  <circle cx="170" cy="160" r="52" fill="#00ED64" fill-opacity="0.12" stroke="#00ED64" stroke-width="1.5"/>
  <circle cx="240" cy="160" r="52" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Intersection label -->
  <text x="205" y="156" text-anchor="middle" font-size="10" font-weight="700" fill="#e2e8f0">Resultado</text>
  <text x="205" y="170" text-anchor="middle" font-size="10" fill="#e2e8f0">AND</text>
  <text x="145" y="164" text-anchor="middle" font-size="10" fill="#94a3b8">A</text>
  <text x="265" y="164" text-anchor="middle" font-size="10" fill="#94a3b8">B</text>

  <rect x="50" y="238" width="310" height="28" rx="5" fill="#001E2B"/>
  <text x="205" y="256" text-anchor="middle" font-size="11" fill="#e2e8f0">{ status:"ok", total: { $gt: 100 } }</text>
  <text x="205" y="275" text-anchor="middle" font-size="10" fill="#94a3b8">Ambas condiciones verdaderas</text>

  <!-- OR section -->
  <rect x="410" y="55" width="330" height="200" rx="8" fill="#023430"/>
  <text x="575" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">$or</text>
  <text x="575" y="98" text-anchor="middle" font-size="11" fill="#94a3b8">AL MENOS UN criterio debe cumplirse</text>

  <!-- Union circles -->
  <circle cx="540" cy="160" r="52" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="610" cy="160" r="52" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="510" y="156" text-anchor="middle" font-size="10" fill="#e2e8f0">A</text>
  <text x="640" y="156" text-anchor="middle" font-size="10" fill="#e2e8f0">B</text>
  <text x="575" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#e2e8f0">A OR B</text>

  <rect x="420" y="238" width="310" height="28" rx="5" fill="#001E2B"/>
  <text x="575" y="256" text-anchor="middle" font-size="11" fill="#e2e8f0">{ $or: [ {status:"ok"}, {total:{$gt:100}} ] }</text>
  <text x="575" y="275" text-anchor="middle" font-size="10" fill="#94a3b8">Al menos una condición verdadera</text>

  <!-- Bottom note -->
  <rect x="40" y="290" width="700" height="36" rx="6" fill="#023430"/>
  <text x="390" y="313" text-anchor="middle" font-size="11" fill="#94a3b8">
    { year: 2024, $or: [{status:"ok"},{total:{$gt:100}}] }  →  year=2024 AND (status="ok" OR total>100)
  </text>
</svg>
