<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#001E2B"/>
  <text x="380" y="28" font-family="Inter,Roboto,sans-serif" font-size="15" font-weight="700" fill="#00ED64" text-anchor="middle">Índice Geoespacial 2dsphere — $near y $geoWithin</text>

  <!-- Map area with circles -->
  <rect x="20" y="45" width="340" height="250" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="190" y="62" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Vista del mapa (Bogotá)</text>

  <!-- Grid lines -->
  <line x1="40" y1="70" x2="340" y2="70" stroke="#00684A" stroke-width="0.3"/>
  <line x1="40" y1="115" x2="340" y2="115" stroke="#00684A" stroke-width="0.3"/>
  <line x1="40" y1="160" x2="340" y2="160" stroke="#00684A" stroke-width="0.3"/>
  <line x1="40" y1="205" x2="340" y2="205" stroke="#00684A" stroke-width="0.3"/>
  <line x1="40" y1="250" x2="340" y2="250" stroke="#00684A" stroke-width="0.3"/>
  <line x1="80" y1="68" x2="80" y2="280" stroke="#00684A" stroke-width="0.3"/>
  <line x1="160" y1="68" x2="160" y2="280" stroke="#00684A" stroke-width="0.3"/>
  <line x1="240" y1="68" x2="240" y2="280" stroke="#00684A" stroke-width="0.3"/>
  <line x1="320" y1="68" x2="320" y2="280" stroke="#00684A" stroke-width="0.3"/>

  <!-- Reference point (user location) -->
  <circle cx="185" cy="168" r="5" fill="#00ED64"/>
  <text x="195" y="163" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#00ED64">Mi ubicación</text>
  <text x="195" y="174" font-family="Inter,Roboto,sans-serif" font-size="7.5" fill="#94a3b8">[-74.08, 4.70]</text>

  <!-- $near circle (2km radius) -->
  <circle cx="185" cy="168" r="55" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="248" y="125" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#fbbf24">$near 2km</text>

  <!-- $geoWithin box -->
  <rect x="100" y="100" width="150" height="110" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="104" y="98" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#60a5fa">$geoWithin ($box)</text>

  <!-- Stores in near range (green) -->
  <rect x="155" y="128" width="10" height="10" fill="#00ED64"/>
  <text x="168" y="138" font-family="Inter,Roboto,sans-serif" font-size="7.5" fill="#00ED64">Store A (0.8km)</text>
  <rect x="205" y="183" width="10" height="10" fill="#00ED64"/>
  <text x="218" y="193" font-family="Inter,Roboto,sans-serif" font-size="7.5" fill="#00ED64">Store B (1.2km)</text>
  <rect x="135" y="178" width="10" height="10" fill="#00ED64"/>
  <text x="90" y="188" font-family="Inter,Roboto,sans-serif" font-size="7.5" fill="#00ED64">Store C (1.5km)</text>

  <!-- Stores out of range (gray) -->
  <rect x="290" y="100" width="10" height="10" fill="#94a3b8"/>
  <text x="303" y="110" font-family="Inter,Roboto,sans-serif" font-size="7.5" fill="#94a3b8">Store D (4km)</text>
  <rect x="55" y="240" width="10" height="10" fill="#94a3b8"/>
  <text x="68" y="250" font-family="Inter,Roboto,sans-serif" font-size="7.5" fill="#94a3b8">Store E (5km)</text>

  <!-- Right panel -->
  <rect x="375" y="45" width="365" height="250" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="557" y="62" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Queries Geoespaciales</text>

  <!-- GeoJSON format -->
  <text x="390" y="80" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Formato GeoJSON (coordinates: [longitud, latitud]):</text>
  <rect x="390" y="86" width="335" height="30" rx="3" fill="#001E2B"/>
  <text x="400" y="99" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">location: { type:</text>
  <text x="505" y="99" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">"Point"</text>
  <text x="547" y="99" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">, coordinates:</text>
  <text x="400" y="112" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#60a5fa">[-74.08, 4.70]</text>
  <text x="462" y="112" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// [long, lat]</text>
  <text x="540" y="112" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">}</text>

  <!-- $near query -->
  <text x="390" y="132" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">$near — ordenado por distancia:</text>
  <rect x="390" y="138" width="335" height="50" rx="3" fill="#001E2B"/>
  <text x="400" y="151" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">db.stores.find({ location: { $near: {</text>
  <text x="410" y="164" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">$geometry: { type: "Point",</text>
  <text x="420" y="177" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">coordinates: [-74.08, 4.70] },</text>
  <text x="410" y="185" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">$maxDistance: 2000 }}})</text>

  <!-- $geoWithin query -->
  <text x="390" y="203" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#60a5fa">$geoWithin — dentro del rectángulo:</text>
  <rect x="390" y="209" width="335" height="40" rx="3" fill="#001E2B"/>
  <text x="400" y="222" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">db.stores.find({ location: {</text>
  <text x="410" y="235" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">$geoWithin: { $box: [</text>
  <text x="420" y="247" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">[-74.10, 4.68], [-74.05, 4.72] ]}}})</text>

  <!-- Note -->
  <text x="390" y="270" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#fbbf24">⚠️ $near requiere índice 2dsphere.</text>
  <text x="390" y="282" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8">$geoWithin no lo requiere pero lo usa si existe.</text>

  <!-- Bottom: create index -->
  <rect x="20" y="308" width="720" height="55" rx="5" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="380" y="325" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">Crear el índice 2dsphere</text>
  <text x="40" y="343" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// El campo location debe contener un objeto GeoJSON válido</text>
  <text x="400" y="343" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">db.stores.createIndex({ location:</text>
  <text x="615" y="343" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64">"2dsphere"</text>
  <text x="680" y="343" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">})</text>
  <text x="40" y="357" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Coordenadas: longitud [-180, 180] | latitud [-90, 90]</text>
</svg>
