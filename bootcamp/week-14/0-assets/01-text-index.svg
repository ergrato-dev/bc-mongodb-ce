<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#001E2B"/>
  <text x="380" y="28" font-family="Inter,Roboto,sans-serif" font-size="15" font-weight="700" fill="#00ED64" text-anchor="middle">Índice de Texto — $text y textScore</text>

  <!-- Collection with text fields -->
  <text x="150" y="52" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">Colección articles</text>
  <rect x="20" y="60" width="260" height="175" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <!-- doc 1 -->
  <rect x="32" y="70" width="236" height="38" rx="3" fill="#001E2B"/>
  <text x="42" y="83" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">title:</text>
  <text x="76" y="83" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"MongoDB índices de rendimiento"</text>
  <text x="42" y="96" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">category:</text>
  <text x="90" y="96" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"databases"</text>
  <!-- doc 2 -->
  <rect x="32" y="112" width="236" height="38" rx="3" fill="#001E2B"/>
  <text x="42" y="125" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">title:</text>
  <text x="76" y="125" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"Optimización de índices en MongoDB"</text>
  <text x="42" y="138" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">category:</text>
  <text x="90" y="138" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"performance"</text>
  <!-- doc 3 -->
  <rect x="32" y="154" width="236" height="38" rx="3" fill="#001E2B"/>
  <text x="42" y="167" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">title:</text>
  <text x="76" y="167" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"Guía completa de clusters"</text>
  <text x="42" y="180" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">category:</text>
  <text x="90" y="180" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"infrastructure"</text>
  <!-- doc 4 -->
  <rect x="32" y="196" width="236" height="30" rx="3" fill="#001E2B"/>
  <text x="42" y="209" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">title:</text>
  <text x="76" y="209" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"Rendimiento en bases de datos"</text>
  <text x="42" y="221" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">category:</text>
  <text x="90" y="221" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">"databases"</text>

  <!-- Arrow -->
  <line x1="280" y1="150" x2="320" y2="150" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arr14)"/>

  <!-- Text Index Token Box -->
  <text x="480" y="52" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#00ED64" text-anchor="middle">Text Index (tokenizado)</text>
  <rect x="320" y="60" width="420" height="175" rx="5" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="345" y="80" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Token</text>
  <text x="460" y="80" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Documentos</text>
  <line x1="330" y1="85" x2="730" y2="85" stroke="#00684A" stroke-width="0.8"/>
  <!-- tokens -->
  <text x="345" y="100" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">mongodb</text>
  <text x="460" y="100" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">doc1, doc2</text>
  <text x="345" y="115" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">indic (raíz)</text>
  <text x="460" y="115" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">doc1 (score:1.5), doc2 (score:2.0)</text>
  <text x="345" y="130" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">rendimient (raíz)</text>
  <text x="460" y="130" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">doc2 (score:1.8), doc4 (score:1.2)</text>
  <text x="345" y="145" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">optimiz (raíz)</text>
  <text x="460" y="145" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">doc2 (score:1.6)</text>
  <text x="345" y="160" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">cluster</text>
  <text x="460" y="160" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">doc3 (score:1.0)</text>
  <text x="345" y="175" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8">(stop words ignoradas: "de", "en", "la"...)</text>
  <text x="345" y="190" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8">(stemming: "índices" → "indic", "optimización" → "optimiz")</text>
  <text x="345" y="225" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Solo 1 índice text por colección</text>

  <!-- Bottom section: query examples -->
  <rect x="20" y="258" width="340" height="105" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="190" y="276" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">Queries con $text</text>
  <text x="35" y="293" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Buscar palabra</text>
  <text x="35" y="307" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.articles.find({ $text: { $search: "mongodb" } })</text>
  <text x="35" y="321" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Excluir palabra</text>
  <text x="35" y="335" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.articles.find({ $text: { $search: "mongodb -cluster" } })</text>
  <text x="35" y="349" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">// Frase exacta</text>
  <text x="35" y="363" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.articles.find({ $text: { $search: '"bases de datos"' } })</text>

  <rect x="380" y="258" width="360" height="105" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="560" y="276" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">Ordenar por relevancia</text>
  <text x="395" y="293" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">db.articles.find(</text>
  <text x="405" y="307" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">{ $text: { $search: "mongodb rendimiento" } },</text>
  <text x="405" y="321" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#60a5fa">{ score: { $meta: "textScore" }, title: 1 }</text>
  <text x="395" y="335" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">).sort(</text>
  <text x="405" y="349" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#fbbf24">{ score: { $meta: "textScore" } }</text>
  <text x="395" y="363" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#e2e8f0">)</text>

  <defs>
    <marker id="arr14" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
  </defs>
</svg>
