<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" width="780" height="340" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="780" height="340" fill="#001E2B"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Operadores de Comparación</text>

  <!-- Number line -->
  <line x1="60" y1="160" x2="720" y2="160" stroke="#475569" stroke-width="2"/>
  <!-- Ticks -->
  <line x1="120" y1="148" x2="120" y2="172" stroke="#94a3b8" stroke-width="2"/>
  <line x1="220" y1="148" x2="220" y2="172" stroke="#94a3b8" stroke-width="2"/>
  <line x1="320" y1="148" x2="320" y2="172" stroke="#94a3b8" stroke-width="2"/>
  <line x1="420" y1="148" x2="420" y2="172" stroke="#94a3b8" stroke-width="2"/>
  <line x1="520" y1="148" x2="520" y2="172" stroke="#94a3b8" stroke-width="2"/>
  <line x1="620" y1="148" x2="620" y2="172" stroke="#94a3b8" stroke-width="2"/>
  <!-- Tick labels -->
  <text x="120" y="188" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="220" y="188" text-anchor="middle" font-size="13" fill="#94a3b8">10</text>
  <text x="320" y="188" text-anchor="middle" font-size="13" fill="#94a3b8">20</text>
  <text x="420" y="188" text-anchor="middle" font-size="13" fill="#94a3b8">50</text>
  <text x="520" y="188" text-anchor="middle" font-size="13" fill="#94a3b8">100</text>
  <text x="620" y="188" text-anchor="middle" font-size="13" fill="#94a3b8">200</text>

  <!-- $gt 20 — right of 320 -->
  <rect x="325" y="210" width="370" height="32" rx="6" fill="#00ED64" fill-opacity="0.18"/>
  <line x1="320" y1="205" x2="320" y2="248" stroke="#00ED64" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="500" y="231" text-anchor="middle" font-size="12" fill="#00ED64">{ price: { $gt: 20 } }</text>

  <!-- $lt 100 — left of 520 -->
  <rect x="60" y="250" width="455" height="32" rx="6" fill="#60a5fa" fill-opacity="0.18"/>
  <line x1="520" y1="245" x2="520" y2="288" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="280" y="271" text-anchor="middle" font-size="12" fill="#60a5fa">{ price: { $lt: 100 } }</text>

  <!-- $gte/$lte combined band -->
  <rect x="320" y="290" width="200" height="32" rx="6" fill="#fbbf24" fill-opacity="0.18"/>
  <text x="420" y="311" text-anchor="middle" font-size="12" fill="#fbbf24">{ $gte: 20, $lte: 100 }</text>

  <!-- Operator table header -->
  <text x="390" y="68" text-anchor="middle" font-size="13" fill="#94a3b8">Lectura de los operadores</text>

  <!-- Table -->
  <rect x="60" y="78" width="290" height="62" rx="6" fill="#023430"/>
  <text x="100" y="97" font-size="12" fill="#e2e8f0"><tspan font-weight="700" fill="#00ED64">$eq</tspan>  igual a       <tspan fill="#00ED64">$ne</tspan>  distinto de</text>
  <text x="100" y="116" font-size="12" fill="#e2e8f0"><tspan font-weight="700" fill="#60a5fa">$gt</tspan>  mayor que     <tspan fill="#60a5fa">$gte</tspan>  mayor o igual</text>
  <text x="100" y="135" font-size="12" fill="#e2e8f0"><tspan font-weight="700" fill="#fbbf24">$lt</tspan>  menor que     <tspan fill="#fbbf24">$lte</tspan>  menor o igual</text>

  <!-- Right info box -->
  <rect x="420" y="78" width="300" height="62" rx="6" fill="#023430"/>
  <text x="435" y="97" font-size="12" fill="#e2e8f0">$eq implícito:</text>
  <text x="435" y="114" font-size="11" fill="#94a3b8">{ status: "active" }</text>
  <text x="435" y="129" font-size="11" fill="#94a3b8">equivale a: { status: { $eq: "active" } }</text>
</svg>
