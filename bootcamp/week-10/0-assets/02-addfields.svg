<svg viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="860" height="360" fill="#001E2B"/>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#00ED64">$addFields vs $project</text>

  <!-- ORIGINAL DOC -->
  <rect x="20" y="55" width="200" height="220" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <rect x="20" y="55" width="200" height="26" rx="5" fill="#00684A"/>
  <text x="120" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">Documento original</text>
  <text x="30" y="100" font-size="10" fill="#94a3b8">_id: ObjectId</text>
  <text x="30" y="118" font-size="10" fill="#e2e8f0">product: "Laptop"</text>
  <text x="30" y="136" font-size="10" fill="#e2e8f0">price: 1200</text>
  <text x="30" y="154" font-size="10" fill="#e2e8f0">quantity: 3</text>
  <text x="30" y="172" font-size="10" fill="#e2e8f0">category: "electronics"</text>
  <text x="30" y="190" font-size="10" fill="#e2e8f0">status: "completed"</text>
  <text x="30" y="244" font-size="11" font-weight="bold" fill="#fbbf24">5 campos</text>

  <!-- ARROW 1 to $addFields -->
  <line x1="220" y1="165" x2="280" y2="165" stroke="#00ED64" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="158" text-anchor="middle" font-size="9" fill="#00ED64">$addFields</text>

  <!-- $addFields panel -->
  <rect x="280" y="55" width="245" height="220" rx="5" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <rect x="280" y="55" width="245" height="26" rx="5" fill="#00ED64"/>
  <text x="402" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">$addFields — resultado</text>
  <text x="290" y="100" font-size="10" fill="#94a3b8">_id: ObjectId</text>
  <text x="290" y="118" font-size="10" fill="#e2e8f0">product: "Laptop"</text>
  <text x="290" y="136" font-size="10" fill="#e2e8f0">price: 1200</text>
  <text x="290" y="154" font-size="10" fill="#e2e8f0">quantity: 3</text>
  <text x="290" y="172" font-size="10" fill="#e2e8f0">category: "electronics"</text>
  <text x="290" y="190" font-size="10" fill="#e2e8f0">status: "completed"</text>
  <text x="290" y="210" font-size="10" fill="#00ED64">totalValue: 3600  ← NUEVO</text>
  <text x="290" y="244" font-size="11" font-weight="bold" fill="#00ED64">6 campos ✓ preserva todos</text>

  <!-- ARROW 2 to $project -->
  <line x1="220" y1="195" x2="560" y2="265" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="400" y="255" text-anchor="middle" font-size="9" fill="#fbbf24">$project</text>

  <!-- $project panel -->
  <rect x="560" y="55" width="280" height="220" rx="5" fill="#023430" stroke="#fbbf24" stroke-width="2"/>
  <rect x="560" y="55" width="280" height="26" rx="5" fill="#fbbf24"/>
  <text x="700" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">$project — resultado</text>
  <text x="570" y="100" font-size="10" fill="#94a3b8">_id: ObjectId  (siempre, a menos que)</text>
  <text x="570" y="116" font-size="10" fill="#94a3b8">_id: 0 lo excluya)</text>
  <text x="570" y="138" font-size="10" fill="#e2e8f0">product: "Laptop"  ← solo este</text>
  <text x="570" y="156" font-size="10" fill="#e2e8f0">totalValue: 3600   ← calculado</text>
  <text x="570" y="178" font-size="10" fill="#ef4444">price → EXCLUIDO</text>
  <text x="570" y="194" font-size="10" fill="#ef4444">quantity → EXCLUIDO</text>
  <text x="570" y="210" font-size="10" fill="#ef4444">category, status → EXCLUIDOS</text>
  <text x="570" y="244" font-size="11" font-weight="bold" fill="#fbbf24">solo campos declarados</text>

  <!-- Note -->
  <rect x="20" y="295" width="820" height="45" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="430" y="315" text-anchor="middle" font-size="11" fill="#e2e8f0">$addFields  añade campos al documento existente (no elimina nada)</text>
  <text x="430" y="333" text-anchor="middle" font-size="11" fill="#e2e8f0">$project  define exactamente qué campos tendrá el documento de salida</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>
