<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="860" height="340" fill="#001E2B"/>
  <text x="430" y="33" text-anchor="middle" font-size="17" font-weight="bold" fill="#00ED64">Pipeline Complejo — Múltiples Etapas</text>

  <!-- Stage boxes -->
  <!-- $addFields -->
  <rect x="20" y="56" width="170" height="200" rx="5" fill="#023430" stroke="#60a5fa" stroke-width="2"/>
  <rect x="20" y="56" width="170" height="26" rx="5" fill="#60a5fa"/>
  <text x="105" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">① $addFields</text>
  <text x="30" y="100" font-size="10" fill="#94a3b8">Enriquece el documento</text>
  <text x="30" y="116" font-size="10" fill="#94a3b8">sin perder campos</text>
  <text x="30" y="138" font-size="10" fill="#e2e8f0">totalValue:</text>
  <text x="30" y="153" font-size="10" fill="#e2e8f0">  price × quantity</text>
  <text x="30" y="170" font-size="10" fill="#e2e8f0">tier: $cond(…)</text>
  <rect x="30" y="228" width="150" height="20" rx="3" fill="#001E2B"/>
  <text x="105" y="242" text-anchor="middle" font-size="10" fill="#fbbf24">15 docs → 15 docs</text>

  <!-- arrow 1 -->
  <line x1="190" y1="156" x2="228" y2="156" stroke="#00ED64" stroke-width="2" marker-end="url(#a1)"/>

  <!-- $match -->
  <rect x="228" y="56" width="170" height="200" rx="5" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <rect x="228" y="56" width="170" height="26" rx="5" fill="#00ED64"/>
  <text x="313" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">② $match</text>
  <text x="238" y="100" font-size="10" fill="#94a3b8">Filtra documentos</text>
  <text x="238" y="116" font-size="10" fill="#94a3b8">Usar lo antes posible</text>
  <text x="238" y="138" font-size="10" fill="#e2e8f0">status: "completed"</text>
  <text x="238" y="153" font-size="10" fill="#e2e8f0">tier: "premium"</text>
  <rect x="238" y="228" width="150" height="20" rx="3" fill="#001E2B"/>
  <text x="313" y="242" text-anchor="middle" font-size="10" fill="#fbbf24">15 docs → 7 docs</text>

  <!-- arrow 2 -->
  <line x1="398" y1="156" x2="436" y2="156" stroke="#00ED64" stroke-width="2" marker-end="url(#a2)"/>

  <!-- $group -->
  <rect x="436" y="56" width="190" height="200" rx="5" fill="#023430" stroke="#fbbf24" stroke-width="2"/>
  <rect x="436" y="56" width="190" height="26" rx="5" fill="#fbbf24"/>
  <text x="531" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">③ $group</text>
  <text x="446" y="100" font-size="10" fill="#94a3b8">Agrupa por campo</text>
  <text x="446" y="116" font-size="10" fill="#94a3b8">Aplica acumuladores</text>
  <text x="446" y="138" font-size="10" fill="#e2e8f0">_id: "$city"</text>
  <text x="446" y="153" font-size="10" fill="#e2e8f0">total: { $sum: 1 }</text>
  <text x="446" y="168" font-size="10" fill="#e2e8f0">revenue: { $sum: "$totalValue" }</text>
  <rect x="446" y="228" width="170" height="20" rx="3" fill="#001E2B"/>
  <text x="531" y="242" text-anchor="middle" font-size="10" fill="#fbbf24">7 docs → 3 grupos</text>

  <!-- arrow 3 -->
  <line x1="626" y1="156" x2="664" y2="156" stroke="#00ED64" stroke-width="2" marker-end="url(#a3)"/>

  <!-- $sort -->
  <rect x="664" y="56" width="176" height="200" rx="5" fill="#023430" stroke="#ef4444" stroke-width="2"/>
  <rect x="664" y="56" width="176" height="26" rx="5" fill="#ef4444"/>
  <text x="752" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">④ $sort / $limit</text>
  <text x="674" y="100" font-size="10" fill="#94a3b8">Ordena resultados</text>
  <text x="674" y="116" font-size="10" fill="#94a3b8">Limita cantidad de docs</text>
  <text x="674" y="138" font-size="10" fill="#e2e8f0">revenue: -1  (desc)</text>
  <text x="674" y="153" font-size="10" fill="#e2e8f0">$limit: 3</text>
  <rect x="674" y="228" width="156" height="20" rx="3" fill="#001E2B"/>
  <text x="752" y="242" text-anchor="middle" font-size="10" fill="#fbbf24">3 grupos → top 3</text>

  <!-- Best practices note -->
  <rect x="20" y="275" width="820" height="50" rx="4" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="430" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#00ED64">Buenas prácticas</text>
  <text x="430" y="313" text-anchor="middle" font-size="10" fill="#e2e8f0">Colocar $match lo antes posible  ·  Comentar cada etapa  ·  Depurar con $limit: 3 al inicio  ·  Usar $addFields antes de $match para filtrar por campos calculados</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00ED64"/></marker>
  </defs>
</svg>
