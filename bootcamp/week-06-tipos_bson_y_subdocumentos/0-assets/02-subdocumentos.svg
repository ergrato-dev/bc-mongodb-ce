<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 330" width="780" height="330" font-family="Inter, Roboto, sans-serif">
  <rect width="780" height="330" fill="#001E2B"/>
  <text x="390" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#00ED64">Subdocumentos Embebidos</text>

  <!-- Employee flat label -->
  <text x="50" y="60" font-size="12" font-weight="600" fill="#94a3b8">Documento: employees</text>

  <!-- Main document box -->
  <rect x="30" y="68" width="330" height="205" rx="6" fill="#023430"/>
  <text x="50" y="90" font-size="12" font-weight="600" fill="#e2e8f0">_id: ObjectId("64abc123")</text>
  <text x="50" y="108" font-size="12" fill="#e2e8f0">name: <tspan fill="#fbbf24">"Isabela Ramos"</tspan></text>
  <text x="50" y="126" font-size="12" fill="#e2e8f0">age: <tspan fill="#34d399">NumberInt(29)</tspan></text>
  <text x="50" y="144" font-size="12" fill="#e2e8f0">salary: <tspan fill="#fbbf24">Decimal128("4500.00")</tspan></text>
  <text x="50" y="162" font-size="12" fill="#e2e8f0">hireDate: <tspan fill="#60a5fa">Date("2022-06-01")</tspan></text>
  <!-- address subdoc -->
  <rect x="44" y="170" width="306" height="90" rx="4" fill="#001E2B"/>
  <text x="56" y="188" font-size="12" fill="#e2e8f0">address: <tspan fill="#00ED64">{</tspan></text>
  <text x="72" y="205" font-size="12" fill="#e2e8f0">  street: <tspan fill="#fbbf24">"Av. Principal 456"</tspan></text>
  <text x="72" y="221" font-size="12" fill="#e2e8f0">  city: <tspan fill="#fbbf24">"Bogotá"</tspan></text>
  <text x="72" y="237" font-size="12" fill="#e2e8f0">  country: <tspan fill="#fbbf24">"Colombia"</tspan></text>
  <text x="56" y="252" font-size="12" fill="#00ED64">}</text>

  <!-- Arrow -->
  <line x1="365" y1="170" x2="415" y2="170" stroke="#00684A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="415,165 425,170 415,175" fill="#00684A"/>

  <!-- Dot notation queries -->
  <rect x="430" y="68" width="320" height="205" rx="6" fill="#023430"/>
  <text x="450" y="90" font-size="12" font-weight="600" fill="#00ED64">Dot Notation — Queries</text>

  <text x="450" y="114" font-size="11" fill="#94a3b8">// Filtrar por ciudad</text>
  <rect x="444" y="120" width="292" height="28" rx="3" fill="#001E2B"/>
  <text x="450" y="139" font-size="11" fill="#e2e8f0">db.employees.find({</text>
  <text x="470" y="152" font-size="11" fill="#60a5fa">  "address.city": "Bogotá"</text>

  <text x="450" y="176" font-size="11" fill="#94a3b8">// Actualizar campo anidado</text>
  <rect x="444" y="182" width="292" height="42" rx="3" fill="#001E2B"/>
  <text x="450" y="199" font-size="11" fill="#e2e8f0">db.employees.updateOne(</text>
  <text x="470" y="213" font-size="11" fill="#e2e8f0">  { name: "Isabela Ramos" },</text>
  <text x="470" y="228" font-size="11" fill="#60a5fa">  { $set: { "address.city": "Cali" } }</text>

  <text x="450" y="252" font-size="11" fill="#94a3b8">// Proyectar campo específico</text>
  <text x="450" y="264" font-size="11" fill="#e2e8f0">{ <tspan fill="#60a5fa">"address.city": 1</tspan>, _id: 0 }</text>

  <!-- Rule box -->
  <rect x="30" y="285" width="720" height="32" rx="5" fill="#023430"/>
  <text x="390" y="302" text-anchor="middle" font-size="11" fill="#94a3b8">Regla: Usa </text>
  <text x="390" y="302" text-anchor="middle" font-size="11" fill="#e2e8f0">Regla: Usa dot notation ("campo.subcampo") para queries y proyecciones en subdocumentos</text>
  <text x="390" y="314" text-anchor="middle" font-size="11" fill="#94a3b8">La igualdad exacta de objetos requiere coincidencia total del subdocumento (evitar)</text>
</svg>
