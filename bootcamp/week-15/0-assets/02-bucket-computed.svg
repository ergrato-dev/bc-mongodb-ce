<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#001E2B"/>
  <text x="380" y="26" font-family="Inter,Roboto,sans-serif" font-size="14" font-weight="700" fill="#00ED64" text-anchor="middle">Patrones: Bucket y Computed</text>

  <!-- LEFT: Bucket Pattern -->
  <text x="185" y="48" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Bucket Pattern</text>

  <!-- Problem: 1 doc per reading -->
  <rect x="20" y="55" width="145" height="80" rx="4" fill="#001E2B" stroke="#ef4444" stroke-width="1.5"/>
  <text x="92" y="70" font-family="Inter,Roboto,sans-serif" font-size="9" font-weight="700" fill="#ef4444" text-anchor="middle">❌ 1 doc por lectura</text>
  <text x="30" y="84" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">{ sensorId: "s01",</text>
  <text x="30" y="97" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">  temp: 22.4,</text>
  <text x="30" y="110" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">  ts: ISODate(...) }</text>
  <text x="92" y="126" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">315M docs/año</text>

  <!-- Arrow -->
  <line x1="165" y1="96" x2="195" y2="96" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arr15c)"/>

  <!-- Bucket document -->
  <rect x="195" y="55" width="170" height="155" rx="4" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="280" y="70" font-family="Inter,Roboto,sans-serif" font-size="9" font-weight="700" fill="#00ED64" text-anchor="middle">✅ Bucket document</text>
  <text x="205" y="85" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">sensorId: "s01"</text>
  <text x="205" y="98" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">hour: "2024-01-15T08"</text>
  <text x="205" y="111" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">count: 60</text>
  <text x="205" y="124" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">minTemp: 20.1</text>
  <text x="205" y="137" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">maxTemp: 24.8</text>
  <text x="205" y="150" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">sumTemp: 1340.4</text>
  <text x="205" y="163" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">readings: [</text>
  <text x="215" y="176" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8">{ ts: ..., temp: 22.4 },</text>
  <text x="215" y="188" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8">... (60 lecturas)</text>
  <text x="205" y="200" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">]</text>

  <!-- Upsert command -->
  <rect x="20" y="220" width="345" height="145" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="192" y="238" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle">Upsert Bucket</text>
  <text x="35" y="254" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">db.sensor_buckets.updateOne(</text>
  <text x="45" y="268" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">{ sensorId: "s01", hour: "2024-01-15T08" },</text>
  <text x="45" y="282" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">{ $push: { readings: { ts: new Date(), temp: 22.4 } },</text>
  <text x="55" y="296" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">  $inc:  { count: 1, sumTemp: 22.4 },</text>
  <text x="55" y="310" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">  $min:  { minTemp: 22.4 },</text>
  <text x="55" y="324" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">  $max:  { maxTemp: 22.4 } },</text>
  <text x="45" y="338" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#00ED64">{ upsert: true }   // crea bucket si no existe</text>
  <text x="35" y="352" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">)</text>

  <!-- RIGHT: Computed Pattern -->
  <text x="565" y="48" font-family="Inter,Roboto,sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Computed Pattern</text>

  <!-- Without computed -->
  <rect x="390" y="55" width="155" height="90" rx="4" fill="#001E2B" stroke="#ef4444" stroke-width="1.5"/>
  <text x="467" y="70" font-family="Inter,Roboto,sans-serif" font-size="9" font-weight="700" fill="#ef4444" text-anchor="middle">❌ Calcular en lectura</text>
  <text x="400" y="85" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">db.orders.aggregate([</text>
  <text x="408" y="98" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">{ $match: {cId:"c01"} },</text>
  <text x="408" y="111" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">{ $group: { ... } }</text>
  <text x="400" y="124" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">]) // en cada petición</text>
  <text x="467" y="138" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">Costoso en lectura frecuente</text>

  <!-- Arrow -->
  <line x1="545" y1="155" x2="545" y2="175" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arr15d)"/>

  <!-- Customer with computed fields -->
  <rect x="390" y="175" width="155" height="100" rx="4" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <text x="467" y="190" font-family="Inter,Roboto,sans-serif" font-size="9" font-weight="700" fill="#00ED64" text-anchor="middle">✅ Campo Precomputado</text>
  <text x="400" y="205" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">customerId: "c01"</text>
  <text x="400" y="218" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">name: "Carlos Pérez"</text>
  <text x="400" y="231" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">totalRevenue: Decimal128</text>
  <text x="400" y="244" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">  ("2510.50")</text>
  <text x="400" y="257" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">orderCount: 12</text>
  <text x="400" y="270" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#60a5fa">lastOrderDate: Date</text>

  <!-- new order → $inc -->
  <rect x="560" y="175" width="180" height="145" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="650" y="193" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">Al insertar orden</text>
  <text x="570" y="210" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">// 1) Insertar la orden</text>
  <text x="570" y="224" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">db.orders.insertOne({ ... })</text>
  <text x="570" y="244" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#94a3b8">// 2) Actualizar campo calculado</text>
  <text x="570" y="258" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">db.customers.updateOne(</text>
  <text x="580" y="272" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">{ customerId: "c01" },</text>
  <text x="580" y="286" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#fbbf24">{ $inc: {</text>
  <text x="588" y="299" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#fbbf24">totalRevenue: 89.99,</text>
  <text x="588" y="311" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#fbbf24">orderCount: 1 } }</text>
  <text x="570" y="324" font-family="Inter,Roboto,sans-serif" font-size="8.5" fill="#e2e8f0">)</text>

  <defs>
    <marker id="arr15c" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
    <marker id="arr15d" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
  </defs>
</svg>
