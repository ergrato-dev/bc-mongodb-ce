<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="760" height="380" fill="#001E2B"/>
  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" fill="#00ED64" font-size="15" font-weight="700">RBAC — Control de Acceso Basado en Roles</text>

  <!-- User layer -->
  <rect x="15" y="45" width="150" height="285" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.2"/>
  <text x="90" y="67" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Usuarios</text>

  <rect x="25" y="77" width="130" height="36" rx="4" fill="#001E2B" stroke="#fbbf24" stroke-width="1"/>
  <text x="90" y="91" text-anchor="middle" fill="#e2e8f0" font-size="9">admin_user</text>
  <text x="90" y="106" text-anchor="middle" fill="#94a3b8" font-size="8">dbOwner en bootcamp_db</text>

  <rect x="25" y="122" width="130" height="36" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="90" y="136" text-anchor="middle" fill="#e2e8f0" font-size="9">app_user</text>
  <text x="90" y="151" text-anchor="middle" fill="#94a3b8" font-size="8">readWrite en bootcamp_db</text>

  <rect x="25" y="167" width="130" height="36" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="90" y="181" text-anchor="middle" fill="#e2e8f0" font-size="9">analytics_user</text>
  <text x="90" y="196" text-anchor="middle" fill="#94a3b8" font-size="8">read en bootcamp_db</text>

  <rect x="25" y="212" width="130" height="36" rx="4" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="90" y="226" text-anchor="middle" fill="#e2e8f0" font-size="9">dba_user</text>
  <text x="90" y="241" text-anchor="middle" fill="#94a3b8" font-size="8">dbAdmin en bootcamp_db</text>

  <rect x="25" y="257" width="130" height="36" rx="4" fill="#001E2B" stroke="#ef4444" stroke-width="1"/>
  <text x="90" y="271" text-anchor="middle" fill="#e2e8f0" font-size="9">root_user</text>
  <text x="90" y="286" text-anchor="middle" fill="#94a3b8" font-size="8">root en admin (global)</text>

  <!-- Arrows users → roles -->
  <line x1="165" y1="160" x2="200" y2="160" stroke="#00684A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Roles layer -->
  <rect x="200" y="45" width="190" height="285" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.2"/>
  <text x="295" y="67" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Roles Built-in</text>

  <rect x="210" y="77" width="170" height="30" rx="4" fill="#001E2B" stroke="#00ED64" stroke-width="1"/>
  <text x="295" y="90" text-anchor="middle" fill="#00ED64" font-size="9" font-weight="600">dbOwner</text>
  <text x="295" y="102" text-anchor="middle" fill="#94a3b8" font-size="8">Control total de la BD</text>

  <rect x="210" y="116" width="170" height="30" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="295" y="129" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">readWrite</text>
  <text x="295" y="141" text-anchor="middle" fill="#94a3b8" font-size="8">Read + Write en colecciones</text>

  <rect x="210" y="155" width="170" height="30" rx="4" fill="#001E2B" stroke="#60a5fa" stroke-width="1"/>
  <text x="295" y="168" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">read</text>
  <text x="295" y="180" text-anchor="middle" fill="#94a3b8" font-size="8">Solo lectura en colecciones</text>

  <rect x="210" y="194" width="170" height="30" rx="4" fill="#001E2B" stroke="#fbbf24" stroke-width="1"/>
  <text x="295" y="207" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">dbAdmin</text>
  <text x="295" y="219" text-anchor="middle" fill="#94a3b8" font-size="8">Índices, stats, profiling</text>

  <rect x="210" y="233" width="170" height="30" rx="4" fill="#001E2B" stroke="#fbbf24" stroke-width="1"/>
  <text x="295" y="246" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">userAdmin</text>
  <text x="295" y="258" text-anchor="middle" fill="#94a3b8" font-size="8">Gestionar usuarios de la BD</text>

  <rect x="210" y="272" width="170" height="40" rx="4" fill="#001E2B" stroke="#ef4444" stroke-width="1"/>
  <text x="295" y="288" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">root (admin DB)</text>
  <text x="295" y="302" text-anchor="middle" fill="#94a3b8" font-size="8">Superadmin global — peligroso</text>

  <!-- Arrows roles → permissions -->
  <line x1="390" y1="160" x2="425" y2="160" stroke="#00684A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Permissions layer -->
  <rect x="425" y="45" width="315" height="285" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.2"/>
  <text x="582" y="67" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Permisos (Acciones)</text>

  <text x="440" y="90" fill="#00ED64" font-size="9" font-weight="600">readWrite incluye:</text>
  <text x="440" y="105" fill="#94a3b8" font-size="8.5">find, insert, update, delete, createIndex</text>

  <text x="440" y="125" fill="#60a5fa" font-size="9" font-weight="600">read incluye:</text>
  <text x="440" y="140" fill="#94a3b8" font-size="8.5">find, listCollections, listIndexes</text>

  <text x="440" y="160" fill="#fbbf24" font-size="9" font-weight="600">dbAdmin incluye:</text>
  <text x="440" y="175" fill="#94a3b8" font-size="8.5">createIndex, dropIndex, collMod, dbStats</text>
  <text x="440" y="188" fill="#94a3b8" font-size="8.5">validate, reIndex, enableProfiler</text>

  <text x="440" y="208" fill="#fbbf24" font-size="9" font-weight="600">userAdmin incluye:</text>
  <text x="440" y="223" fill="#94a3b8" font-size="8.5">createUser, dropUser, grantRolesToUser</text>
  <text x="440" y="236" fill="#94a3b8" font-size="8.5">revokeRolesFromUser, updateUser</text>

  <rect x="435" y="250" width="295" height="65" rx="4" fill="#001E2B" stroke="#00684A" stroke-width="1"/>
  <text x="582" y="267" text-anchor="middle" fill="#00ED64" font-size="9" font-weight="600">Principio de Mínimo Privilegio</text>
  <text x="582" y="282" text-anchor="middle" fill="#94a3b8" font-size="8">Otorgar solo los permisos estrictamente necesarios.</text>
  <text x="582" y="296" text-anchor="middle" fill="#94a3b8" font-size="8">Nunca usar root para aplicaciones. Preferir readWrite.</text>
  <text x="582" y="310" text-anchor="middle" fill="#94a3b8" font-size="8">Crear un usuario por servicio / aplicación.</text>
</svg>
