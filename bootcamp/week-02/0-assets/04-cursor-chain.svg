<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="Inter,Roboto,'Open Sans',sans-serif">
  <rect width="760" height="440" fill="#001E2B"/>
  <rect width="760" height="46" fill="#023430"/>
  <text x="380" y="30" text-anchor="middle" fill="#00ED64" font-size="16" font-weight="700">Métodos de Cursor — sort() · limit() · skip()</text>

  <defs>
    <marker id="ag" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
  </defs>

  <!-- Dataset visual -->
  <text x="380" y="68" text-anchor="middle" fill="#94a3b8" font-size="10">Colección: 8 libros desordenados en disco</text>

  <!-- 8 libros en desorden -->
  <rect x="28" y="76" width="704" height="34" rx="4" fill="#023430"/>
  <rect x="36" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="70" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">JS Basics</text>
  <rect x="112" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="146" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">Clean Code</text>
  <rect x="188" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="222" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">YDKJS</text>
  <rect x="264" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="298" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">Pragmatic</text>
  <rect x="340" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="374" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">Design Pat.</text>
  <rect x="416" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="450" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">Node.js</text>
  <rect x="492" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="526" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">Pro MongoDB</text>
  <rect x="568" y="83" width="68" height="20" rx="3" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="602" y="97" text-anchor="middle" fill="#e2e8f0" font-size="9">Refactoring</text>

  <!-- SORT -->
  <rect x="28" y="130" width="220" height="130" rx="6" fill="#023430" stroke="#a78bfa" stroke-width="2"/>
  <rect x="28" y="130" width="220" height="28" rx="6" fill="#a78bfa"/>
  <rect x="28" y="150" width="220" height="8" fill="#a78bfa"/>
  <text x="138" y="149" text-anchor="middle" fill="#001E2B" font-size="11" font-weight="700">.sort({ year: -1 })</text>

  <text x="44" y="177" fill="#94a3b8" font-size="9">Ordena de más nuevo a más antiguo</text>

  <rect x="40" y="186" width="196" height="64" rx="3" fill="#001E2B"/>
  <text x="48" y="201" fill="#93c5fd" font-size="9">1.</text>
  <text x="60" y="201" fill="#e2e8f0" font-size="9"> Refactoring (2018)</text>
  <text x="48" y="217" fill="#93c5fd" font-size="9">2.</text>
  <text x="60" y="217" fill="#e2e8f0" font-size="9"> Pro MongoDB (2016)</text>
  <text x="48" y="233" fill="#93c5fd" font-size="9">3.</text>
  <text x="60" y="233" fill="#e2e8f0" font-size="9"> Node.js (2014)</text>
  <text x="48" y="249" fill="#94a3b8" font-size="8">... y el resto</text>

  <!-- Flecha sort → limit -->
  <line x1="249" y1="195" x2="268" y2="195" stroke="#00ED64" stroke-width="2" marker-end="url(#ag)"/>

  <!-- LIMIT -->
  <rect x="270" y="130" width="220" height="130" rx="6" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <rect x="270" y="130" width="220" height="28" rx="6" fill="#00ED64"/>
  <rect x="270" y="150" width="220" height="8" fill="#00ED64"/>
  <text x="380" y="149" text-anchor="middle" fill="#001E2B" font-size="11" font-weight="700">.limit(3)</text>

  <text x="286" y="177" fill="#94a3b8" font-size="9">Toma solo los primeros 3</text>

  <rect x="282" y="186" width="196" height="64" rx="3" fill="#001E2B"/>
  <text x="290" y="201" fill="#86efac" font-size="9">✅</text>
  <text x="304" y="201" fill="#e2e8f0" font-size="9"> Refactoring (2018)</text>
  <text x="290" y="217" fill="#86efac" font-size="9">✅</text>
  <text x="304" y="217" fill="#e2e8f0" font-size="9"> Pro MongoDB (2016)</text>
  <text x="290" y="233" fill="#86efac" font-size="9">✅</text>
  <text x="304" y="233" fill="#e2e8f0" font-size="9"> Node.js (2014)</text>
  <text x="290" y="249" fill="#f87171" font-size="8">✗ los demás son descartados</text>

  <!-- SKIP -->
  <rect x="512" y="130" width="220" height="130" rx="6" fill="#023430" stroke="#fbbf24" stroke-width="2"/>
  <rect x="512" y="130" width="220" height="28" rx="6" fill="#fbbf24"/>
  <rect x="512" y="150" width="220" height="8" fill="#fbbf24"/>
  <text x="622" y="149" text-anchor="middle" fill="#001E2B" font-size="11" font-weight="700">.skip(N) — paginación</text>

  <text x="528" y="177" fill="#94a3b8" font-size="9">Salta N docs antes de empezar</text>

  <rect x="524" y="186" width="196" height="64" rx="3" fill="#001E2B"/>
  <text x="532" y="201" fill="#fbbf24" font-size="9">Página 1:</text>
  <text x="586" y="201" fill="#e2e8f0" font-size="9">.skip(0).limit(3)</text>
  <text x="532" y="217" fill="#fbbf24" font-size="9">Página 2:</text>
  <text x="586" y="217" fill="#e2e8f0" font-size="9">.skip(3).limit(3)</text>
  <text x="532" y="233" fill="#fbbf24" font-size="9">Página 3:</text>
  <text x="586" y="233" fill="#e2e8f0" font-size="9">.skip(6).limit(3)</text>
  <text x="532" y="249" fill="#94a3b8" font-size="8">skip = (páginaActual - 1) × porPágina</text>

  <!-- Orden de ejecución -->
  <rect x="28" y="278" width="704" height="54" rx="6" fill="#0f172a" stroke="#00684A" stroke-width="1.5"/>
  <text x="380" y="298" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Orden interno de ejecución (independiente del orden en el código):</text>

  <rect x="170" y="306" width="80" height="20" rx="4" fill="#a78bfa"/>
  <text x="210" y="320" text-anchor="middle" fill="#001E2B" font-size="10" font-weight="700">sort()</text>
  <line x1="251" y1="316" x2="286" y2="316" stroke="#00ED64" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="288" y="306" width="80" height="20" rx="4" fill="#fbbf24"/>
  <text x="328" y="320" text-anchor="middle" fill="#001E2B" font-size="10" font-weight="700">skip()</text>
  <line x1="369" y1="316" x2="406" y2="316" stroke="#00ED64" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="408" y="306" width="80" height="20" rx="4" fill="#00ED64"/>
  <text x="448" y="320" text-anchor="middle" fill="#001E2B" font-size="10" font-weight="700">limit()</text>

  <!-- Ejemplo completo -->
  <rect x="28" y="344" width="704" height="80" rx="6" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="44" y="364" fill="#94a3b8" font-size="10" font-weight="600">Consulta completa — Top 5 libros en stock más caros (página 2):</text>
  <rect x="44" y="372" width="664" height="40" rx="4" fill="#001E2B"/>
  <text x="52" y="389" fill="#00ED64" font-size="10">db.books.find(</text>
  <text x="148" y="389" fill="#f97316" font-size="10">{ inStock: true }</text>
  <text x="260" y="389" fill="#00ED64" font-size="10">,</text>
  <text x="270" y="389" fill="#a78bfa" font-size="10">{ title: 1, price: 1, _id: 0 }</text>
  <text x="438" y="389" fill="#00ED64" font-size="10">)</text>
  <text x="448" y="389" fill="#a78bfa" font-size="10">.sort({ price: -1 })</text>
  <text x="566" y="389" fill="#fbbf24" font-size="10">.skip(5)</text>
  <text x="608" y="389" fill="#00ED64" font-size="10">.limit(5)</text>
  <text x="656" y="407" fill="#94a3b8" font-size="8" font-style="italic">← docs 6–10</text>
</svg>
