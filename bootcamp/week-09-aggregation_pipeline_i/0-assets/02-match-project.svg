<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="860" height="400" fill="#001E2B"/>
  <text x="430" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#00ED64">$match y $project — Transformación de Documentos</text>

  <!-- Documentos entrada -->
  <text x="110" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#60a5fa">Entrada</text>
  <rect x="20" y="78" width="180" height="140" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="30" y="98" font-size="10" fill="#94a3b8">{ _id: 1,</text>
  <text x="30" y="113" font-size="10" fill="#e2e8f0">  name: "Laptop X",</text>
  <text x="30" y="128" font-size="10" fill="#e2e8f0">  category: "electronics",</text>
  <text x="30" y="143" font-size="10" fill="#e2e8f0">  price: 1200,</text>
  <text x="30" y="158" font-size="10" fill="#e2e8f0">  isActive: true,</text>
  <text x="30" y="173" font-size="10" fill="#e2e8f0">  stock: 5,</text>
  <text x="30" y="188" font-size="10" fill="#e2e8f0">  tags: ["new"] }</text>

  <rect x="20" y="226" width="180" height="110" rx="5" fill="#023430" stroke="#00684A" stroke-width="1" opacity="0.5"/>
  <text x="30" y="246" font-size="10" fill="#94a3b8">{ _id: 2,</text>
  <text x="30" y="261" font-size="10" fill="#94a3b8">  name: "Pen Drive",</text>
  <text x="30" y="276" font-size="10" fill="#94a3b8">  category: "accessories",</text>
  <text x="30" y="291" font-size="10" fill="#94a3b8">  price: 15,</text>
  <text x="30" y="306" font-size="10" fill="#94a3b8">  isActive: true, … }</text>

  <!-- Flecha → $match -->
  <line x1="200" y1="185" x2="250" y2="185" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="248,180 258,185 248,190" fill="#60a5fa"/>

  <!-- $match box -->
  <rect x="258" y="140" width="145" height="90" rx="6" fill="#023430" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="258" y="140" width="145" height="26" rx="6" fill="#60a5fa"/>
  <text x="330" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">$match</text>
  <text x="330" y="182" text-anchor="middle" font-size="10" fill="#e2e8f0">{ category: "electronics",</text>
  <text x="330" y="197" text-anchor="middle" font-size="10" fill="#e2e8f0">  price: { $gt: 100 } }</text>
  <text x="330" y="218" text-anchor="middle" font-size="10" fill="#fbbf24">Solo pasan los que cumplen</text>

  <!-- Flecha → $project -->
  <line x1="403" y1="185" x2="453" y2="185" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="451,180 461,185 451,190" fill="#fbbf24"/>

  <!-- $project box -->
  <rect x="461" y="140" width="145" height="90" rx="6" fill="#023430" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="461" y="140" width="145" height="26" rx="6" fill="#fbbf24"/>
  <text x="533" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#001E2B">$project</text>
  <text x="533" y="182" text-anchor="middle" font-size="10" fill="#e2e8f0">{ _id: 0,</text>
  <text x="533" y="197" text-anchor="middle" font-size="10" fill="#e2e8f0">  name: 1, price: 1 }</text>
  <text x="533" y="218" text-anchor="middle" font-size="10" fill="#fbbf24">Cambia la forma del doc</text>

  <!-- Flecha → Salida -->
  <line x1="606" y1="185" x2="660" y2="185" stroke="#00ED64" stroke-width="2"/>
  <polygon points="658,180 668,185 658,190" fill="#00ED64"/>

  <!-- Documentos salida -->
  <text x="740" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#00ED64">Salida</text>
  <rect x="668" y="78" width="172" height="80" rx="5" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="678" y="98" font-size="10" fill="#e2e8f0">{</text>
  <text x="688" y="113" font-size="10" fill="#00ED64">  name: "Laptop X",</text>
  <text x="688" y="128" font-size="10" fill="#00ED64">  price: 1200</text>
  <text x="678" y="143" font-size="10" fill="#e2e8f0">}</text>

  <!-- Leyenda de campos excluidos -->
  <text x="430" y="320" text-anchor="middle" font-size="11" fill="#94a3b8">$match reduce el número de documentos.</text>
  <text x="430" y="340" text-anchor="middle" font-size="11" fill="#94a3b8">$project reduce y transforma los campos de cada documento.</text>
  <line x1="668" y1="167" x2="840" y2="167" stroke="#00684A" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="678" y="182" font-size="9" fill="#94a3b8">campos _id, category,</text>
  <text x="678" y="196" font-size="9" fill="#94a3b8">isActive, stock, tags</text>
  <text x="678" y="210" font-size="9" fill="#ef4444">→ excluidos por $project</text>
</svg>
