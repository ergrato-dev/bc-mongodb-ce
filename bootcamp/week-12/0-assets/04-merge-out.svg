<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360">
  <rect width="760" height="360" fill="#001E2B"/>
  <text x="380" y="28" font-family="Inter,Roboto,sans-serif" font-size="15" font-weight="700" fill="#00ED64" text-anchor="middle">$out vs $merge — Persistir Resultados</text>

  <!-- LEFT: $out -->
  <text x="185" y="54" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">$out — Reemplaza la colección</text>

  <!-- Pipeline box -->
  <rect x="20" y="65" width="130" height="55" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="85" y="85" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">Pipeline</text>
  <text x="85" y="100" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">$match → $group</text>
  <text x="85" y="113" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">→ $sort</text>

  <!-- $out stage -->
  <rect x="175" y="70" width="80" height="45" rx="5" fill="#023430" stroke="#ef4444" stroke-width="1.5"/>
  <text x="215" y="90" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">$out</text>
  <text x="215" y="106" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"summary"</text>

  <line x1="150" y1="92" x2="173" y2="92" stroke="#00684A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Target collection -->
  <rect x="275" y="55" width="80" height="170" rx="5" fill="#023430" stroke="#ef4444" stroke-width="1.5"/>
  <text x="315" y="75" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">summary</text>

  <!-- old docs with strikethrough visual -->
  <rect x="282" y="82" width="66" height="15" rx="3" fill="#001E2B" opacity="0.5"/>
  <text x="315" y="93" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle" text-decoration="line-through">old doc 1</text>
  <rect x="282" y="100" width="66" height="15" rx="3" fill="#001E2B" opacity="0.5"/>
  <text x="315" y="111" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle" text-decoration="line-through">old doc 2</text>
  <line x1="282" y1="94" x2="348" y2="94" stroke="#ef4444" stroke-width="1"/>
  <line x1="282" y1="112" x2="348" y2="112" stroke="#ef4444" stroke-width="1"/>

  <!-- new docs -->
  <rect x="282" y="120" width="66" height="15" rx="3" fill="#00684A"/>
  <text x="315" y="131" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">new doc 1</text>
  <rect x="282" y="138" width="66" height="15" rx="3" fill="#00684A"/>
  <text x="315" y="149" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">new doc 2</text>
  <rect x="282" y="156" width="66" height="15" rx="3" fill="#00684A"/>
  <text x="315" y="167" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">new doc 3</text>

  <line x1="255" y1="92" x2="273" y2="130" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arre)"/>

  <text x="315" y="240" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">⚠ Elimina y recrea</text>
  <text x="315" y="254" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">la colección completa</text>

  <!-- Divider -->
  <line x1="380" y1="45" x2="380" y2="350" stroke="#00684A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- RIGHT: $merge -->
  <text x="570" y="54" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#00ED64" text-anchor="middle">$merge — Actualiza selectivamente</text>

  <rect x="395" y="65" width="130" height="55" rx="5" fill="#023430" stroke="#00684A" stroke-width="1.5"/>
  <text x="460" y="85" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">Pipeline</text>
  <text x="460" y="100" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">$match → $group</text>
  <text x="460" y="113" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">→ $sort</text>

  <rect x="550" y="70" width="80" height="45" rx="5" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="590" y="90" font-family="Inter,Roboto,sans-serif" font-size="12" font-weight="700" fill="#00ED64" text-anchor="middle">$merge</text>
  <text x="590" y="106" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">into: "stats"</text>

  <line x1="525" y1="92" x2="548" y2="92" stroke="#00684A" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="648" y="45" width="90" height="200" rx="5" fill="#023430" stroke="#00ED64" stroke-width="1.5"/>
  <text x="693" y="65" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#00ED64" text-anchor="middle">stats</text>

  <!-- existing docs (kept) -->
  <rect x="655" y="72" width="76" height="14" rx="3" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="693" y="83" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">historical 1 ✓</text>
  <rect x="655" y="89" width="76" height="14" rx="3" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="693" y="100" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">historical 2 ✓</text>

  <!-- updated docs -->
  <rect x="655" y="108" width="76" height="14" rx="3" fill="#00684A"/>
  <text x="693" y="119" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">updated doc ↺</text>
  <rect x="655" y="125" width="76" height="14" rx="3" fill="#00684A"/>
  <text x="693" y="136" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">updated doc ↺</text>

  <!-- inserted docs -->
  <rect x="655" y="143" width="76" height="14" rx="3" fill="#00684A" opacity="0.7"/>
  <text x="693" y="154" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">new insert +</text>
  <rect x="655" y="160" width="76" height="14" rx="3" fill="#00684A" opacity="0.7"/>
  <text x="693" y="171" font-family="Inter,Roboto,sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">new insert +</text>

  <line x1="630" y1="92" x2="646" y2="130" stroke="#00ED64" stroke-width="1.5" marker-end="url(#arrg)"/>

  <text x="560" y="186" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">whenMatched: "merge"</text>
  <text x="560" y="200" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">whenNotMatched: "insert"</text>
  <text x="560" y="220" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64">✅ Docs históricos: se conservan</text>

  <!-- Bottom comparison -->
  <rect x="20" y="280" width="340" height="55" rx="5" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="190" y="298" font-family="Inter,Roboto,sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">¿Cuándo usar cada uno?</text>
  <text x="30" y="313" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#ef4444">$out →</text>
  <text x="70" y="313" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">ETL batch: recrear totalmente la colección de resumen</text>
  <text x="30" y="328" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#00ED64">$merge →</text>
  <text x="75" y="328" font-family="Inter,Roboto,sans-serif" font-size="9" fill="#94a3b8">Actualizar stats incrementales sin borrar histórico</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00684A"/>
    </marker>
    <marker id="arre" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrg" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
  </defs>
</svg>
