<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="760" height="380" fill="#001E2B"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" fill="#00ED64" font-size="15" font-weight="bold">Change Streams — Flujo de Eventos en Tiempo Real</text>

  <!-- Replica Set requirement note -->
  <rect x="20" y="38" width="720" height="24" rx="4" fill="#023430" stroke="#fbbf24"/>
  <text x="380" y="55" text-anchor="middle" fill="#fbbf24" font-size="10">⚠ Requiere Replica Set o Sharded Cluster — no funciona en modo standalone</text>

  <!-- LEFT: MongoDB Replica Set -->
  <rect x="20" y="72" width="190" height="120" rx="6" fill="#023430" stroke="#00684A"/>
  <text x="115" y="90" text-anchor="middle" fill="#00ED64" font-size="11" font-weight="bold">MongoDB Replica Set</text>

  <rect x="35" y="98" width="160" height="28" rx="4" fill="#001E2B" stroke="#00684A"/>
  <text x="115" y="117" text-anchor="middle" fill="#e2e8f0" font-size="10">Primary (oplog)</text>

  <rect x="35" y="130" width="75" height="24" rx="4" fill="#001E2B" stroke="#00684A"/>
  <text x="72" y="147" text-anchor="middle" fill="#94a3b8" font-size="9">Secondary 1</text>

  <rect x="120" y="130" width="75" height="24" rx="4" fill="#001E2B" stroke="#00684A"/>
  <text x="157" y="147" text-anchor="middle" fill="#94a3b8" font-size="9">Secondary 2</text>

  <text x="115" y="180" text-anchor="middle" fill="#94a3b8" font-size="9">oplog: log de todas las</text>
  <text x="115" y="192" text-anchor="middle" fill="#94a3b8" font-size="9">operaciones de escritura</text>

  <!-- Arrow: oplog → Change Stream -->
  <line x1="210" y1="130" x2="260" y2="130" stroke="#00ED64" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- CENTER: Change Stream -->
  <rect x="260" y="72" width="200" height="120" rx="6" fill="#023430" stroke="#00ED64"/>
  <text x="360" y="90" text-anchor="middle" fill="#00ED64" font-size="11" font-weight="bold">Change Stream</text>
  <text x="275" y="108" fill="#94a3b8" font-size="9">// Abrir stream sobre colección</text>
  <text x="275" y="122" fill="#60a5fa" font-size="9">const cs = db.orders.watch()</text>
  <text x="275" y="138" fill="#94a3b8" font-size="9">// Iterar eventos</text>
  <text x="275" y="152" fill="#60a5fa" font-size="9">while (cs.hasNext()) {</text>
  <text x="285" y="166" fill="#e2e8f0" font-size="9">const evt = cs.next()</text>
  <text x="275" y="180" fill="#60a5fa" font-size="9">}</text>

  <!-- Arrow: Change Stream → App -->
  <line x1="460" y1="130" x2="510" y2="130" stroke="#00ED64" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- RIGHT: Application -->
  <rect x="510" y="72" width="230" height="120" rx="6" fill="#023430" stroke="#60a5fa"/>
  <text x="625" y="90" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Aplicación / Consumer</text>
  <text x="520" y="108" fill="#94a3b8" font-size="9">evt.operationType: "insert"</text>
  <text x="520" y="122" fill="#94a3b8" font-size="9">evt.fullDocument: { ... }</text>
  <text x="520" y="138" fill="#94a3b8" font-size="9">evt.documentKey._id: ObjectId</text>
  <text x="520" y="154" fill="#94a3b8" font-size="9">evt._id: resumeToken</text>
  <text x="520" y="170" fill="#00ED64" font-size="9">→ notificar, cachear, sincronizar</text>
  <text x="520" y="184" fill="#00ED64" font-size="9">→ trigger downstream events</text>

  <!-- Bottom: event types -->
  <rect x="20" y="212" width="720" height="150" rx="6" fill="#023430" stroke="#00684A"/>
  <text x="380" y="230" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">Tipos de evento — operationType</text>

  <!-- Event boxes -->
  <rect x="30" y="238" width="100" height="50" rx="4" fill="#001E2B" stroke="#00ED64"/>
  <text x="80" y="255" text-anchor="middle" fill="#00ED64" font-size="10" font-weight="bold">insert</text>
  <text x="80" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Nuevo doc</text>
  <text x="80" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">insertado</text>

  <rect x="140" y="238" width="100" height="50" rx="4" fill="#001E2B" stroke="#60a5fa"/>
  <text x="190" y="255" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">update</text>
  <text x="190" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Doc modificado</text>
  <text x="190" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">updateDescription</text>

  <rect x="250" y="238" width="100" height="50" rx="4" fill="#001E2B" stroke="#ef4444"/>
  <text x="300" y="255" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">delete</text>
  <text x="300" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Doc eliminado</text>
  <text x="300" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">documentKey._id</text>

  <rect x="360" y="238" width="100" height="50" rx="4" fill="#001E2B" stroke="#fbbf24"/>
  <text x="410" y="255" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">replace</text>
  <text x="410" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Doc reemplazado</text>
  <text x="410" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">fullDocument nuevo</text>

  <rect x="470" y="238" width="100" height="50" rx="4" fill="#001E2B" stroke="#94a3b8"/>
  <text x="520" y="255" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="bold">drop</text>
  <text x="520" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Colección</text>
  <text x="520" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">eliminada</text>

  <rect x="580" y="238" width="150" height="50" rx="4" fill="#001E2B" stroke="#94a3b8"/>
  <text x="655" y="255" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="bold">invalidate</text>
  <text x="655" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Stream invalidado</text>
  <text x="655" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">(drop/rename/dropDB)</text>

  <text x="380" y="348" text-anchor="middle" fill="#94a3b8" font-size="9">Casos de uso: notificaciones push, sincronización de caché, auditoría, event sourcing, dashboards en vivo</text>
  <text x="380" y="362" text-anchor="middle" fill="#94a3b8" font-size="9">El resumeToken (_id del evento) permite reanudar el stream desde el último evento procesado</text>

  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#00ED64"/>
    </marker>
  </defs>
</svg>
