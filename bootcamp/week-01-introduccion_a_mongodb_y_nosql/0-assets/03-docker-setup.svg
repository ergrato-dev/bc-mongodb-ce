<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="Inter,Roboto,'Open Sans',sans-serif">

  <!-- Fondo -->
  <rect width="760" height="440" fill="#001E2B"/>

  <!-- Barra de título -->
  <rect width="760" height="46" fill="#023430"/>
  <text x="380" y="30" text-anchor="middle" fill="#00ED64" font-size="16" font-weight="700">Entorno MongoDB con Docker — Flujo de Conexión</text>

  <!-- ═══════════════════════ -->
  <!-- BLOQUE 1: Terminal Dev  -->
  <!-- ═══════════════════════ -->
  <rect x="28" y="68" width="170" height="130" rx="8" fill="#023430" stroke="#00684A" stroke-width="2"/>
  <rect x="28" y="68" width="170" height="28" rx="8" fill="#00684A"/>
  <rect x="28" y="88" width="170" height="8" fill="#00684A"/>
  <text x="113" y="87" text-anchor="middle" fill="#001E2B" font-size="11" font-weight="700">💻 Terminal</text>
  <text x="113" y="115" text-anchor="middle" fill="#94a3b8" font-size="9">Máquina del desarrollador</text>
  <rect x="40" y="122" width="146" height="14" rx="3" fill="#0f172a"/>
  <text x="48" y="133" fill="#00ED64" font-size="9">$</text>
  <text x="58" y="133" fill="#e2e8f0" font-size="9">docker compose up -d</text>
  <rect x="40" y="142" width="146" height="14" rx="3" fill="#0f172a"/>
  <text x="48" y="153" fill="#00ED64" font-size="9">$</text>
  <text x="58" y="153" fill="#e2e8f0" font-size="9">docker compose exec...</text>
  <text x="113" y="186" text-anchor="middle" fill="#60a5fa" font-size="9">puerto 27017</text>

  <!-- Flecha 1→2 -->
  <line x1="199" y1="133" x2="248" y2="133" stroke="#00ED64" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00ED64"/>
    </marker>
    <marker id="arrow2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
  </defs>
  <text x="223" y="127" text-anchor="middle" fill="#94a3b8" font-size="8">inicia</text>

  <!-- ═══════════════════════════════════ -->
  <!-- BLOQUE 2: Docker Engine             -->
  <!-- ═══════════════════════════════════ -->
  <rect x="250" y="68" width="250" height="300" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="250" y="68" width="250" height="28" rx="8" fill="#1e3a5f"/>
  <rect x="250" y="88" width="250" height="8" fill="#1e3a5f"/>
  <text x="375" y="87" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">🐳 Docker Engine</text>

  <!-- SubBloque contenedor -->
  <rect x="268" y="110" width="214" height="218" rx="6" fill="#001E2B" stroke="#00684A" stroke-width="1.5"/>
  <rect x="268" y="110" width="214" height="24" rx="6" fill="#00684A"/>
  <rect x="268" y="126" width="214" height="8" fill="#00684A"/>
  <text x="375" y="126" text-anchor="middle" fill="#001E2B" font-size="10" font-weight="700">📦 Contenedor: mongodb</text>

  <text x="284" y="154" fill="#94a3b8" font-size="9" font-weight="600">Imagen:</text>
  <rect x="284" y="159" width="182" height="16" rx="3" fill="#023430"/>
  <text x="375" y="170" text-anchor="middle" fill="#00ED64" font-size="10" font-weight="700">mongo:7.0</text>

  <text x="284" y="194" fill="#94a3b8" font-size="9" font-weight="600">Variables de entorno:</text>
  <rect x="284" y="199" width="182" height="82" rx="3" fill="#023430" stroke="#00684A" stroke-width="1"/>
  <text x="294" y="212" fill="#fbbf24" font-size="7.5">MONGO_INITDB_ROOT_USERNAME</text>
  <text x="302" y="224" fill="#e2e8f0" font-size="9">= bootcamp</text>
  <text x="294" y="238" fill="#fbbf24" font-size="7.5">MONGO_INITDB_ROOT_PASSWORD</text>
  <text x="302" y="250" fill="#e2e8f0" font-size="9">= bootcamp123</text>
  <text x="294" y="264" fill="#fbbf24" font-size="7.5">MONGO_INITDB_DATABASE</text>
  <text x="302" y="276" fill="#e2e8f0" font-size="9">= bootcamp_db</text>

  <text x="284" y="302" fill="#94a3b8" font-size="9" font-weight="600">Volumen persistente:</text>
  <text x="284" y="316" fill="#60a5fa" font-size="9">mongodb_data:/data/db</text>

  <!-- Puerto -->
  <rect x="268" y="338" width="214" height="24" rx="4" fill="#023430" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="375" y="354" text-anchor="middle" fill="#fbbf24" font-size="10">Puerto host: 27017 → contenedor: 27017</text>

  <!-- Flecha 2→3 -->
  <line x1="501" y1="133" x2="552" y2="133" stroke="#00ED64" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="526" y="127" text-anchor="middle" fill="#94a3b8" font-size="8">conecta</text>

  <!-- ═══════════════════════════ -->
  <!-- BLOQUE 3: mongosh           -->
  <!-- ═══════════════════════════ -->
  <rect x="554" y="68" width="178" height="300" rx="8" fill="#023430" stroke="#00ED64" stroke-width="2"/>
  <rect x="554" y="68" width="178" height="28" rx="8" fill="#00ED64"/>
  <rect x="554" y="88" width="178" height="8" fill="#00ED64"/>
  <text x="643" y="87" text-anchor="middle" fill="#001E2B" font-size="12" font-weight="700">mongosh</text>

  <text x="643" y="116" text-anchor="middle" fill="#94a3b8" font-size="9">Shell interactivo de MongoDB</text>

  <rect x="566" y="124" width="154" height="78" rx="4" fill="#001E2B"/>
  <text x="574" y="140" fill="#00ED64" font-size="8">bootcamp_db&gt;</text>
  <text x="574" y="155" fill="#e2e8f0" font-size="8">db.users.find()</text>
  <text x="574" y="171" fill="#00ED64" font-size="8">bootcamp_db&gt;</text>
  <text x="574" y="186" fill="#e2e8f0" font-size="8">db.products.insertOne({</text>
  <text x="582" y="197" fill="#e2e8f0" font-size="8">name: "test"</text>
  <text x="574" y="208" fill="#e2e8f0" font-size="8">})</text>

  <text x="643" y="230" text-anchor="middle" fill="#94a3b8" font-size="9">Base de datos activa:</text>
  <rect x="566" y="236" width="154" height="22" rx="4" fill="#001E2B" stroke="#00ED64" stroke-width="1"/>
  <text x="643" y="251" text-anchor="middle" fill="#00ED64" font-size="11" font-weight="700">bootcamp_db</text>

  <text x="643" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">Comandos de navegación:</text>
  <text x="566" y="298" fill="#60a5fa" font-size="9">show dbs</text>
  <text x="566" y="312" fill="#60a5fa" font-size="9">use bootcamp_db</text>
  <text x="566" y="326" fill="#60a5fa" font-size="9">show collections</text>
  <text x="566" y="340" fill="#60a5fa" font-size="9">db.stats()</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SECCIÓN INFERIOR: comando completo docker-compose       -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="28" y="388" width="704" height="52" rx="6" fill="#0f172a" stroke="#00684A" stroke-width="1"/>
  <text x="44" y="407" fill="#94a3b8" font-size="9" font-weight="600">Comando de conexión:</text>
  <text x="44" y="427" fill="#00ED64" font-size="9">docker compose -f scripts/docker-compose.yml exec mongodb \</text>
  <text x="44" y="439" fill="#e2e8f0" font-size="9">  mongosh -u bootcamp -p bootcamp123 --authenticationDatabase admin bootcamp_db</text>

</svg>
